<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTRO Risk Engine — Анализ журнала операций 1С</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans','Segoe UI',sans-serif;background:#0b0f18;color:#d0d8e4;min-height:100vh}

  /* Constructor */
  .ctor-section{background:#161b26;border:1px solid #252d3d;border-radius:10px;padding:20px 24px;margin-bottom:20px}
  .ctor-title{font-size:13px;font-weight:700;color:#5bc0fa;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .check-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1a2133}
  .check-row:last-child{border-bottom:none}
  .check-toggle{position:relative;width:36px;height:20px;flex-shrink:0}
  .check-toggle input{opacity:0;width:0;height:0;position:absolute}
  .check-slider{position:absolute;inset:0;background:#1e2536;border-radius:10px;cursor:pointer;transition:.2s}
  .check-slider:before{content:"";position:absolute;width:14px;height:14px;left:3px;top:3px;background:#5a6577;border-radius:50%;transition:.2s}
  .check-toggle input:checked + .check-slider{background:#3d7af522;border:1px solid #3d7af5}
  .check-toggle input:checked + .check-slider:before{transform:translateX(16px);background:#5bc0fa}
  .check-label{flex:1;font-size:13px;color:#c4cedb}
  .check-score-input{width:58px;padding:4px 8px;border-radius:5px;border:1px solid #252d3d;background:#0e1219;color:#5bc0fa;font-size:13px;font-family:'JetBrains Mono',monospace;text-align:center;outline:none}
  .check-score-input:focus{border-color:#3d7af5}
  .score-label{font-size:11px;color:#4e5a6e;white-space:nowrap}
  .ctor-add-form{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;padding:14px;background:#0e1219;border-radius:8px;border:1px solid #1a2133;margin-top:12px}
  .ctor-input{padding:7px 12px;border-radius:6px;border:1px solid #252d3d;background:#111724;color:#c4cedb;font-size:13px;font-family:inherit;outline:none;flex:1;min-width:120px}
  .ctor-input:focus{border-color:#3d7af5}
  .ctor-select{padding:7px 10px;border-radius:6px;border:1px solid #252d3d;background:#111724;color:#c4cedb;font-size:13px;font-family:inherit;outline:none}
  .custom-check-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#0e1219;border-radius:7px;border:1px solid #1a2133;margin-top:8px}
  .custom-badge{font-size:10px;padding:1px 7px;border-radius:3px;background:#7c3aed22;border:1px solid #7c3aed44;color:#a78bfa;font-weight:600}
  .del-btn{background:none;border:none;color:#ff3b5c;cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px;transition:.15s}
  .del-btn:hover{background:#ff3b5c22}
  .apply-btn{padding:8px 20px;border-radius:7px;border:none;background:linear-gradient(135deg,#3d7af5,#5bc0fa);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
  .apply-btn:hover{box-shadow:0 0 16px #5bc0fa33}

  /* Charts */
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
  .chart-card{background:#161b26;border:1px solid #252d3d;border-radius:10px;padding:18px 20px}
  .chart-card-title{font-size:13px;font-weight:600;color:#8e9baf;margin-bottom:14px}
  .chart-wrap{position:relative;height:240px}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#0e1219}
  ::-webkit-scrollbar-thumb{background:#2a3349;border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:#3a4a66}

  .header{background:linear-gradient(135deg,#0d1220,#131a2e);border-bottom:1px solid #1a2238;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .header-left{display:flex;align-items:center;gap:14px}
  .logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#5bc0fa,#3d7af5);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;box-shadow:0 0 20px #5bc0fa33}
  .header-title{font-size:17px;font-weight:700;color:#e8ecf2;letter-spacing:-.3px}
  .header-title span{color:#5bc0fa;font-weight:400}
  .header-sub{font-size:11px;color:#4e5a6e}
  .header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .header-tag{padding:6px 14px;border-radius:6px;font-size:12px;font-family:'JetBrains Mono',monospace}
  .tag-file{background:#141c2d;border:1px solid #222d42;color:#7a8da6}
  .tag-count{background:#3d7af522;border:1px solid #3d7af544;color:#5bc0fa;font-weight:600;font-family:'DM Sans',sans-serif}

  .tabs{display:flex;gap:2px;padding:0 28px;background:#0d1220;border-bottom:1px solid #1a2238;overflow-x:auto}
  .tab-btn{padding:12px 20px;background:transparent;border:none;border-bottom:2px solid transparent;color:#5a6577;font-size:13px;font-weight:400;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
  .tab-btn.active{background:#131a2e;border-bottom-color:#5bc0fa;color:#e8ecf2;font-weight:600}
  .tab-btn:hover:not(.active){color:#8e9baf}
  .tab-badge{margin-left:8px;font-size:10px;padding:1px 7px;border-radius:10px;background:#ff3b5c22;color:#ff3b5c;font-weight:700}

  .content{padding:24px 28px}

  .cards{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
  .stat-card{background:#161b26;border:1px solid #252d3d;border-radius:10px;padding:22px 24px;flex:1 1 200px;min-width:180;position:relative;overflow:hidden}
  .stat-card .accent{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:10px 0 0 10px}
  .stat-label{font-size:12px;color:#7a8599;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
  .stat-value{font-size:28px;font-weight:800;font-family:'DM Sans',sans-serif}
  .stat-sub{font-size:12px;color:#5a6577;margin-top:4px}

  .panel{background:#161b26;border-radius:10px;border:1px solid #252d3d;padding:20px 24px;margin-bottom:24px}
  .panel-title{font-size:13px;font-weight:600;color:#8e9baf;margin-bottom:12px}

  .risk-bar{display:flex;border-radius:6px;overflow:hidden;height:10px;background:#0e1219}
  .risk-legend{display:flex;gap:24px;margin-top:12px;flex-wrap:wrap}
  .risk-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7a90}
  .risk-dot{width:8px;height:8px;border-radius:2px}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:800px){.grid-2{grid-template-columns:1fr}}

  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .bar-label{width:130px;font-size:11px;color:#8e9baf;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;background:#0e1219;border-radius:3px;height:6px}
  .bar-fill{height:6px;border-radius:3px;transition:width .5s}
  .bar-count{font-size:11px;color:#6b7a90;width:30px;text-align:right}

  .controls{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
  .search-input{padding:8px 14px;border-radius:6px;border:1px solid #252d3d;background:#111724;color:#c4cedb;font-size:13px;width:300px;outline:none;font-family:inherit}
  .search-input:focus{border-color:#3d7af5}
  .filter-btns{display:flex;gap:4px}
  .filter-btn{padding:6px 12px;border-radius:5px;border:1px solid #252d3d;background:#111724;color:#6b7a90;font-size:12px;cursor:pointer;font-family:inherit;font-weight:400;transition:all .15s}
  .filter-btn.active{font-weight:600}
  .results-count{margin-left:auto;font-size:12px;color:#5a6577}

  .table-wrap{background:#111724;border-radius:10px;border:1px solid #1e2536;overflow:hidden}
  .table-scroll{max-height:520px;overflow-y:auto}
  table{width:100%;border-collapse:collapse}
  th{padding:10px 12px;text-align:left;font-size:11px;color:#6b7a90;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #1e2536;cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0;background:#111724;z-index:2;font-weight:600}
  th:hover{color:#8e9baf}
  td{padding:10px 12px;font-size:13px;color:#c4cedb;border-bottom:1px solid #161d2b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
  tr:hover td{background:#161d2b}
  .mono{font-family:'JetBrains Mono',monospace;font-size:12px}
  .text-right{text-align:right}

  .risk-badge{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.5px}
  .flag-pill{display:inline-block;font-size:10px;padding:1px 6px;background:#1e2536;border:1px solid #2a3349;border-radius:3px;color:#8e9baf;white-space:nowrap;margin:1px 2px}

  .pagination{display:flex;justify-content:center;gap:8px;margin-top:16px}
  .page-btn{padding:6px 14px;border-radius:5px;border:1px solid #252d3d;background:#111724;color:#8e9baf;cursor:pointer;font-family:inherit;font-size:13px}
  .page-btn:disabled{color:#2a3349;cursor:default}
  .page-info{padding:6px 14px;font-size:13px;color:#6b7a90}

  .desc-text{font-size:13px;color:#6b7a90;margin-bottom:16px}
  .fade-in{animation:fadeIn .4s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* Upload zone */
  .upload-zone{border:2px dashed #252d3d;border-radius:12px;padding:48px 32px;text-align:center;transition:all .3s;cursor:pointer;margin-bottom:16px;position:relative}
  .upload-zone:hover,.upload-zone.drag-over{border-color:#5bc0fa;background:#5bc0fa08}
  .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
  .upload-icon{font-size:40px;margin-bottom:12px;opacity:.5}
  .upload-title{font-size:16px;font-weight:600;color:#c4cedb;margin-bottom:6px}
  .upload-hint{font-size:12px;color:#5a6577}
  .upload-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
  @media(max-width:700px){.upload-row{grid-template-columns:1fr}}
  .upload-box{background:#111724;border:1px solid #1e2536;border-radius:10px;padding:20px;position:relative}
  .upload-box-label{font-size:13px;font-weight:600;color:#8e9baf;margin-bottom:12px}
  .file-loaded{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#161b26;border-radius:8px;border:1px solid #252d3d;margin-top:8px}
  .file-loaded-name{font-size:13px;color:#c4cedb;flex:1}
  .file-loaded-size{font-size:11px;color:#5a6577}
  .file-loaded-remove{background:none;border:none;color:#ff3b5c;cursor:pointer;font-size:16px;padding:2px 6px}
  .btn-primary{padding:12px 28px;border-radius:8px;border:none;background:linear-gradient(135deg,#3d7af5,#5bc0fa);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.3px}
  .btn-primary:hover{box-shadow:0 0 24px #5bc0fa44;transform:translateY(-1px)}
  .btn-primary:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}
  .btn-secondary{padding:8px 18px;border-radius:6px;border:1px solid #252d3d;background:#111724;color:#8e9baf;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-secondary:hover{border-color:#5bc0fa;color:#5bc0fa}

  .progress-bar{height:4px;background:#0e1219;border-radius:2px;overflow:hidden;margin:16px 0}
  .progress-fill{height:100%;background:linear-gradient(90deg,#3d7af5,#5bc0fa);border-radius:2px;transition:width .3s}

  /* Comparison */
  .change-up{color:#3ddc84}
  .change-down{color:#ff3b5c}
  .change-same{color:#5a6577}
  .compare-card{background:#161b26;border:1px solid #252d3d;border-radius:10px;padding:18px 22px;flex:1 1 160px;min-width:160px}
  .compare-label{font-size:11px;color:#7a8599;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
  .compare-values{display:flex;align-items:baseline;gap:10px}
  .compare-old{font-size:16px;color:#5a6577;text-decoration:line-through}
  .compare-new{font-size:22px;font-weight:700}
  .compare-delta{font-size:13px;font-weight:600;margin-left:auto}

  /* AI Chat */
  .ai-chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 160px);min-height:400px}
  .ai-chat-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .ai-chat-avatar{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#5bc0fa);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .ai-chat-info{flex:1}
  .ai-chat-name{font-size:14px;font-weight:700;color:#e8ecf2}
  .ai-chat-status{font-size:11px;color:#3ddc84}
  .ai-messages{flex:1;overflow-y:auto;padding:4px 0;display:flex;flex-direction:column;gap:12px}
  .ai-msg{display:flex;gap:10px;align-items:flex-start;animation:fadeIn .3s ease}
  .ai-msg-avatar{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
  .ai-msg-bubble{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.65;max-width:85%}
  .ai-msg.user{flex-direction:row-reverse}
  .ai-msg.user .ai-msg-avatar{background:linear-gradient(135deg,#3d7af5,#5bc0fa)}
  .ai-msg.user .ai-msg-bubble{background:#1e2d4a;color:#c4cedb;border:1px solid #2a3e5e;border-radius:10px 2px 10px 10px}
  .ai-msg.assistant .ai-msg-avatar{background:linear-gradient(135deg,#7c3aed,#5bc0fa)}
  .ai-msg.assistant .ai-msg-bubble{background:#161b26;color:#d0d8e4;border:1px solid #252d3d;border-radius:2px 10px 10px 10px}
  .ai-msg.assistant .ai-msg-bubble b{color:#5bc0fa}
  .ai-input-row{display:flex;gap:8px;margin-top:14px;align-items:flex-end}
  .ai-input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #252d3d;background:#111724;color:#c4cedb;font-size:13px;outline:none;font-family:inherit;resize:none;min-height:42px;max-height:120px;line-height:1.5}
  .ai-input:focus{border-color:#3d7af5}
  .ai-send-btn{padding:10px 18px;border-radius:8px;border:none;background:linear-gradient(135deg,#3d7af5,#5bc0fa);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .2s}
  .ai-send-btn:hover{box-shadow:0 0 16px #5bc0fa44}
  .ai-send-btn:disabled{opacity:.4;cursor:default;box-shadow:none}
  .ai-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .ai-chip{padding:5px 11px;border-radius:20px;border:1px solid #252d3d;background:#111724;color:#7a8da6;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
  .ai-chip:hover{border-color:#5bc0fa;color:#5bc0fa}
  .ai-typing{display:flex;align-items:center;gap:4px;padding:10px 14px}
  .ai-typing span{width:6px;height:6px;border-radius:50%;background:#5bc0fa;animation:typing 1.2s infinite}
  .ai-typing span:nth-child(2){animation-delay:.2s}
  .ai-typing span:nth-child(3){animation-delay:.4s}
  @keyframes typing{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}
  .ai-no-data{text-align:center;padding:40px;color:#5a6577}
  .api-key-banner{background:#111724;border:1px solid #2a3349;border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .api-key-banner.ok{border-color:#3ddc8444;background:#0d1f15}
  .api-key-input{flex:1;min-width:180px;padding:7px 12px;border-radius:6px;border:1px solid #252d3d;background:#0b0f18;color:#c4cedb;font-size:12px;font-family:'JetBrains Mono',monospace;outline:none}
  .api-key-input:focus{border-color:#3d7af5}
  .api-key-btn{padding:7px 14px;border-radius:6px;border:none;background:linear-gradient(135deg,#3d7af5,#5bc0fa);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
  .api-key-clear{padding:7px 10px;border-radius:6px;border:1px solid #252d3d;background:transparent;color:#ff3b5c;font-size:12px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">O</div>
    <div>
      <div class="header-title">OPTRO <span>Risk Engine</span></div>
      <div class="header-sub">Анализ журнала операций 1С</div>
    </div>
  </div>
  <div class="header-right" id="headerRight"></div>
</div>

<div class="tabs" id="tabsBar"></div>
<div class="content" id="mainContent"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONSTANTS & CONFIG
// ═══════════════════════════════════════════════════════════
const RC = {HIGH:"#ff3b5c",MEDIUM:"#ff9f1a",LOW:"#5bc0fa",NORMAL:"#3ddc84"};
const FL = {
  manual_or_adjustment_keyword:"Ручная корр.",period_end_posting:"Конец периода",
  weekend_posting:"Выходной",large_amount:"Крупная сумма",round_amount:"Круглая сумма",
  rare_account_pair:"Редкая пара",unmapped_account:"Нет маппинга",
  unexpected_account_side:"Необычная сторона",missing_document:"Нет документа",
  one_sided_analytics:"Односторонняя аналитика",duplicate_like_entry:"Дубликат",
  new_counterparty_vs_history:"Новый контрагент",extreme_amount:"Экстремальная сумма"
};
const SCORE_MAP = {
  manual_or_adjustment_keyword:30,period_end_posting:15,weekend_posting:10,
  large_amount:25,round_amount:10,rare_account_pair:20,unmapped_account:20,
  unexpected_account_side:25,missing_document:15,one_sided_analytics:10,
  duplicate_like_entry:20,new_counterparty_vs_history:15,extreme_amount:35
};
const SUSPICIOUS_KW = ["ручная","корректировка","исправление","операция вручную","сторно","перенос","закрытие периода","adjustment","manual","correction","reclass"];
const DEFAULT_MAPPING = {
  "1010":"Cash","1030":"Bank","1210":"Accounts Receivable","1250":"Employee Receivables",
  "1310":"Raw Materials","1330":"Goods","2410":"Fixed Assets","2420":"Depreciation",
  "2930":"Other Assets","3310":"Accounts Payable","3350":"Payroll Payable",
  "3390":"Other Payables","6010":"Revenue","6020":"Other Revenue","7010":"COGS",
  "7110":"Selling Expenses","7210":"Administrative Expenses","7310":"Finance Expenses",
  "7410":"Other Expenses","7510":"Tax Expenses"
};
const EXPENSE_GROUPS = ["Administrative Expenses","Selling Expenses","Finance Expenses","Other Expenses","Tax Expenses","COGS"];
const EXPECTED_COLS = ["Период","Документ","Аналитика Дт","Аналитика Кт","Счет Дт","Дебет","Счет Кт","Кредит"];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let APP = {
  tab:"upload", filter:"ALL", search:"", sortField:"risk_score", sortDir:"desc", page:0,
  currentData:null, prevData:null,
  currentFile:null, prevFile:null,
  currentName:"", prevName:"",
  mapping:{...DEFAULT_MAPPING},
  compareResult:null,
  aiMessages:[],
  aiLoading:false,
  apiKey:"",
  // Конструктор проверок
  checks: Object.keys(SCORE_MAP).map(key => ({
    id: key, enabled: true, score: SCORE_MAP[key], label: FL[key]||key, type:"builtin"
  })),
  customChecks: [] // {id, label, type:"keyword"|"range", keywords:[], minAmt, maxAmt, score}
};
const PER_PAGE = 25;

// ═══════════════════════════════════════════════════════════
// RISK ENGINE (mirrors Python code)
// ═══════════════════════════════════════════════════════════
function normalizeAccount(v) {
  if (v==null||v==="") return "";
  let t = String(v).trim();
  if (t.endsWith(".0")) t = t.slice(0,-2);
  return t;
}
function normalizeText(v) { return v==null?"":String(v).trim().toLowerCase(); }

function parseExcel(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, {type:"array", cellDates:true});
  let sheetName = wb.SheetNames.find(s => s.toLowerCase()==="general");
  if (!sheetName) sheetName = wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const json = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});

  // find header row
  let headerIdx = 0;
  for (let i = 0; i < Math.min(json.length, 10); i++) {
    const row = json[i].map(c => String(c).trim().toLowerCase());
    if (row.some(c => c.includes("период") || c.includes("дата"))) { headerIdx = i; break; }
  }

  const dataRows = json.slice(headerIdx + 1).filter(r => r.some(c => c !== ""));
  if (dataRows.length === 0) throw new Error("Нет данных в файле");

  const colCount = json[headerIdx].length;
  const results = [];

  for (const row of dataRows) {
    // adapt to 8 columns by taking the right ones
    let period, doc, anDt, anKt, accDt, debit, accKt, credit;
    if (colCount >= 8) {
      [period, doc, anDt, anKt, accDt, debit, accKt, credit] = row;
    } else {
      continue;
    }

    const dt = period instanceof Date ? period : new Date(period);
    const validDate = !isNaN(dt.getTime());
    const sumDebit = parseFloat(debit) || 0;
    const sumCredit = parseFloat(credit) || 0;
    const amount = Math.max(sumDebit, sumCredit);
    const sDt = normalizeAccount(accDt);
    const sKt = normalizeAccount(accKt);
    const docNorm = normalizeText(doc);
    const anDtNorm = normalizeText(anDt);
    const anKtNorm = normalizeText(anKt);
    const counterparty = anKtNorm.trim() !== "" ? anKtNorm : anDtNorm;
    const pair = `${sDt} → ${sKt}`;
    const dayOfWeek = validDate ? dt.getDay() : -1;
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const dayOfMonth = validDate ? dt.getDate() : 0;
    const isEndOfMonth = dayOfMonth >= 28;

    results.push({
      period: validDate ? dt.toISOString().slice(0,10) : String(period),
      periodDate: validDate ? dt : null,
      document: docNorm,
      analytics_dt: anDtNorm,
      analytics_kt: anKtNorm,
      account_dt: sDt,
      account_kt: sKt,
      debit: sumDebit,
      credit: sumCredit,
      amount, counterparty, pair,
      isWeekend, isEndOfMonth,
      group_dt: "", group_kt: "",
      risk_score: 0, risk_level: "NORMAL", risk_flags: ""
    });
  }
  return results;
}

function applyMapping(data, mapping) {
  for (const r of data) {
    // Try exact match first, then prefix match (e.g. 1210 matches 1210, 12101, etc.)
    r.group_dt = mapping[r.account_dt] || findPrefixMatch(r.account_dt, mapping) || "";
    r.group_kt = mapping[r.account_kt] || findPrefixMatch(r.account_kt, mapping) || "";
  }
  return data;
}

function findPrefixMatch(acc, mapping) {
  if (!acc) return "";
  const keys = Object.keys(mapping).sort((a,b) => b.length - a.length);
  for (const k of keys) {
    if (acc.startsWith(k)) return mapping[k];
  }
  return "";
}

function addFlag(row, score, flag) {
  row.risk_score += score;
  row.risk_flags = row.risk_flags ? row.risk_flags + " | " + flag : flag;
}

function getCheckScore(id) {
  const c = APP.checks.find(c => c.id === id);
  return (c && c.enabled) ? c.score : 0;
}

function calculateRisk(data, historyData) {
  const pairFreq = {};
  const total = data.length;
  data.forEach(r => { pairFreq[r.pair] = (pairFreq[r.pair]||0) + 1; });

  const amounts = data.map(r => r.amount).filter(a => a > 0).sort((a,b) => a-b);
  const p95 = amounts[Math.floor(amounts.length * 0.95)] || 0;
  const p99 = amounts[Math.floor(amounts.length * 0.99)] || 0;

  const historyCPs = new Set();
  if (historyData && historyData.length > 0) {
    historyData.forEach(r => { if (r.counterparty && r.counterparty.trim()) historyCPs.add(r.counterparty.trim().toLowerCase()); });
  }

  const dupKeys = {};
  data.forEach((r,i) => {
    const key = `${r.period}|${r.document}|${r.account_dt}|${r.account_kt}|${r.amount}`;
    if (!dupKeys[key]) dupKeys[key] = [];
    dupKeys[key].push(i);
  });
  const dupIndices = new Set();
  Object.values(dupKeys).forEach(arr => { if (arr.length > 1) arr.forEach(i => dupIndices.add(i)); });

  data.forEach((r, idx) => {
    r.risk_score = 0;
    r.risk_flags = "";

    const allText = r.document + " " + r.analytics_dt + " " + r.analytics_kt;

    // 1. Keywords
    let s = getCheckScore("manual_or_adjustment_keyword");
    if (s && SUSPICIOUS_KW.some(kw => allText.includes(kw))) addFlag(r, s, "manual_or_adjustment_keyword");
    // 2. End of month
    s = getCheckScore("period_end_posting");
    if (s && r.isEndOfMonth) addFlag(r, s, "period_end_posting");
    // 3. Weekend
    s = getCheckScore("weekend_posting");
    if (s && r.isWeekend) addFlag(r, s, "weekend_posting");
    // 4. Large amount
    s = getCheckScore("large_amount");
    if (s && r.amount > p95 && p95 > 0) addFlag(r, s, "large_amount");
    // 5. Round amount
    s = getCheckScore("round_amount");
    if (s && r.amount > 0 && (r.amount % 1000000 === 0 || r.amount % 100000 === 0)) addFlag(r, s, "round_amount");
    // 6. Rare pair
    s = getCheckScore("rare_account_pair");
    if (s && total > 0 && (pairFreq[r.pair] || 0) / total < 0.01) addFlag(r, s, "rare_account_pair");
    // 7. Unmapped
    s = getCheckScore("unmapped_account");
    if (s && (!r.group_dt || !r.group_kt)) addFlag(r, s, "unmapped_account");
    // 8. Wrong side
    s = getCheckScore("unexpected_account_side");
    if (s && (r.group_dt === "Revenue" || EXPENSE_GROUPS.includes(r.group_kt))) addFlag(r, s, "unexpected_account_side");
    // 9. Missing doc
    s = getCheckScore("missing_document");
    if (s && !r.document.trim()) addFlag(r, s, "missing_document");
    // 10. One-sided analytics
    s = getCheckScore("one_sided_analytics");
    const hasDt = r.analytics_dt.trim() !== "";
    const hasKt = r.analytics_kt.trim() !== "";
    if (s && ((hasDt && !hasKt) || (!hasDt && hasKt))) addFlag(r, s, "one_sided_analytics");
    // 11. Duplicates
    s = getCheckScore("duplicate_like_entry");
    if (s && dupIndices.has(idx)) addFlag(r, s, "duplicate_like_entry");
    // 12. New counterparty
    s = getCheckScore("new_counterparty_vs_history");
    if (s && historyCPs.size > 0 && r.counterparty.trim() && !historyCPs.has(r.counterparty.trim().toLowerCase())) {
      addFlag(r, s, "new_counterparty_vs_history");
    }
    // 13. Extreme amount
    s = getCheckScore("extreme_amount");
    if (s && r.amount > p99 && p99 > 0) addFlag(r, s, "extreme_amount");

    // Custom checks
    for (const cc of APP.customChecks) {
      if (!cc.enabled) continue;
      if (cc.type === "keyword" && cc.keywords && cc.keywords.length > 0) {
        if (cc.keywords.some(kw => kw && allText.toLowerCase().includes(kw.toLowerCase()))) {
          addFlag(r, cc.score, "custom_" + cc.id);
        }
      } else if (cc.type === "range") {
        const minOk = (cc.minAmt === "" || cc.minAmt === null || r.amount >= Number(cc.minAmt));
        const maxOk = (cc.maxAmt === "" || cc.maxAmt === null || r.amount <= Number(cc.maxAmt));
        if (minOk && maxOk && r.amount > 0) addFlag(r, cc.score, "custom_" + cc.id);
      }
    }

    r.risk_level = r.risk_score >= 70 ? "HIGH" : r.risk_score >= 40 ? "MEDIUM" : r.risk_score >= 20 ? "LOW" : "NORMAL";
  });

  return data;
}

// ═══════════════════════════════════════════════════════════
// COMPARISON ENGINE
// ═══════════════════════════════════════════════════════════
function compareData(currentData, prevData) {
  const curCounts = {HIGH:0,MEDIUM:0,LOW:0,NORMAL:0};
  const prevCounts = {HIGH:0,MEDIUM:0,LOW:0,NORMAL:0};
  let curTotal=0, prevTotal=0, curSusp=0, prevSusp=0;

  currentData.forEach(r => { curCounts[r.risk_level]++; curTotal+=r.amount; if(r.risk_score>=40) curSusp+=r.amount; });
  prevData.forEach(r => { prevCounts[r.risk_level]++; prevTotal+=r.amount; if(r.risk_score>=40) prevSusp+=r.amount; });

  // Account group totals
  const curGroups = {}, prevGroups = {};
  currentData.forEach(r => {
    const key = r.group_dt || r.account_dt;
    if (!curGroups[key]) curGroups[key] = {debit:0,credit:0,count:0,riskSum:0};
    curGroups[key].debit += r.debit;
    curGroups[key].credit += r.credit;
    curGroups[key].count++;
    curGroups[key].riskSum += r.risk_score;
  });
  prevData.forEach(r => {
    const key = r.group_dt || r.account_dt;
    if (!prevGroups[key]) prevGroups[key] = {debit:0,credit:0,count:0,riskSum:0};
    prevGroups[key].debit += r.debit;
    prevGroups[key].credit += r.credit;
    prevGroups[key].count++;
    prevGroups[key].riskSum += r.risk_score;
  });

  const allGroupKeys = [...new Set([...Object.keys(curGroups),...Object.keys(prevGroups)])];
  const groupChanges = allGroupKeys.map(k => {
    const cur = curGroups[k] || {debit:0,credit:0,count:0,riskSum:0};
    const prev = prevGroups[k] || {debit:0,credit:0,count:0,riskSum:0};
    const curAmt = cur.debit + cur.credit;
    const prevAmt = prev.debit + prev.credit;
    const delta = curAmt - prevAmt;
    const pct = prevAmt > 0 ? ((curAmt - prevAmt)/prevAmt*100) : (curAmt > 0 ? 100 : 0);
    return {group:k, curAmt, prevAmt, delta, pct, curCount:cur.count, prevCount:prev.count,
      curAvgRisk: cur.count>0?cur.riskSum/cur.count:0, prevAvgRisk: prev.count>0?prev.riskSum/prev.count:0,
      isNew: !prevGroups[k], isRemoved: !curGroups[k]
    };
  }).sort((a,b) => Math.abs(b.pct) - Math.abs(a.pct));

  // New counterparties
  const prevCPs = new Set(prevData.map(r => r.counterparty).filter(Boolean));
  const newCPs = [...new Set(currentData.map(r=>r.counterparty).filter(c => c && !prevCPs.has(c)))];

  // New account pairs
  const prevPairs = new Set(prevData.map(r=>r.pair));
  const newPairs = [...new Set(currentData.map(r=>r.pair).filter(p => !prevPairs.has(p)))];

  return {
    curCounts, prevCounts, curTotal, prevTotal, curSusp, prevSusp,
    curLen: currentData.length, prevLen: prevData.length,
    groupChanges, newCPs, newPairs
  };
}

// ═══════════════════════════════════════════════════════════
// PROCESS
// ═══════════════════════════════════════════════════════════
function processFile(buffer, historyData) {
  let data = parseExcel(buffer);
  data = applyMapping(data, APP.mapping);
  data = calculateRisk(data, historyData);
  return data;
}

function renderTable(sourceData, showFilter) {
  const filtered = sourceData.filter(r=>{
    if(APP.filter!=="ALL"&&r.risk_level!==APP.filter)return false;
    if(APP.search){const q=APP.search.toLowerCase();return r.document.includes(q)||r.analytics_dt.includes(q)||r.analytics_kt.includes(q)||r.pair.includes(q)||r.account_dt.includes(q)||r.account_kt.includes(q)}
    return true;
  });
  const sorted=[...filtered].sort((a,b)=>{
    const dir=APP.sortDir==="asc"?1:-1;
    if(APP.sortField==="amount"||APP.sortField==="risk_score")return(a[APP.sortField]-b[APP.sortField])*dir;
    return String(a[APP.sortField]).localeCompare(String(b[APP.sortField]))*dir;
  });
  const tp=Math.ceil(sorted.length/PER_PAGE);
  const pd=sorted.slice(APP.page*PER_PAGE,(APP.page+1)*PER_PAGE);

  const fb = showFilter?`<div class="filter-btns">${["ALL","HIGH","MEDIUM","LOW","NORMAL"].map(l=>{
    const act=APP.filter===l;const col=l==="ALL"?"#5bc0fa":RC[l];
    return`<button class="filter-btn ${act?"active":""}" onclick="setFilter('${l}')" style="${act?`border-color:${col};background:${col}18;color:${col}`:""}">${l==="ALL"?"Все":l}</button>`;
  }).join("")}</div>`:"";

  const rows=pd.map(r=>`<tr>
    <td class="mono" style="color:#7a8da6">${r.period}</td>
    <td>${esc(r.document)}</td>
    <td class="mono">${r.pair}</td>
    <td class="text-right mono" style="font-weight:600;${r.amount>=5e6?"color:#ff9f1a":""}">${fmtFull(r.amount)} ₸</td>
    <td><span class="mono" style="font-weight:700;color:${RC[r.risk_level]}">${r.risk_score}</span></td>
    <td>${badgeHTML(r.risk_level)}</td>
    <td>${flagsHTML(r.risk_flags)}</td>
  </tr>`).join("");

  const pag=tp>1?`<div class="pagination">
    <button class="page-btn" onclick="changePage(-1)" ${APP.page===0?"disabled":""}>←</button>
    <span class="page-info">${APP.page+1} / ${tp}</span>
    <button class="page-btn" onclick="changePage(1)" ${APP.page>=tp-1?"disabled":""}>→</button>
  </div>`:"";

  return`<div class="fade-in">
    <div class="controls">
      <input class="search-input" placeholder="Поиск…" value="${esc(APP.search)}" oninput="setSearch(this.value)">
      ${fb}
      <div class="results-count">${filtered.length} записей</div>
    </div>
    <div class="table-wrap"><div class="table-scroll"><table><thead><tr>
      <th onclick="setSort('period')">Дата${sortIcon('period')}</th>
      <th onclick="setSort('document')">Документ${sortIcon('document')}</th>
      <th>Дт→Кт</th>
      <th class="text-right" onclick="setSort('amount')">Сумма${sortIcon('amount')}</th>
      <th onclick="setSort('risk_score')">Score${sortIcon('risk_score')}</th>
      <th>Уровень</th><th>Флаги</th>
    </tr></thead><tbody>${rows}</tbody></table></div></div>
    ${pag}</div>`;
}

// ═══════════════════════════════════════════════════════════
// PAIRS & GROUPS
// ═══════════════════════════════════════════════════════════
function renderPairs() {
  const data=APP.currentData; const freq={};
  data.forEach(r=>{freq[r.pair]=(freq[r.pair]||0)+1});
  const top=Object.entries(freq).sort((a,b)=>a[1]-b[1]).slice(0,15);
  return`<div class="fade-in"><div class="desc-text">Редкие пары счетов</div>
    <div class="table-wrap"><table><thead><tr><th>Пара счетов</th><th class="text-right">Кол-во</th><th>Частота</th></tr></thead><tbody>
    ${top.map(([p,c])=>`<tr><td class="mono">${p}</td><td class="text-right" style="font-weight:600">${c}</td>
    <td><div style="display:flex;align-items:center;gap:8px"><div class="bar-track" style="width:120px"><div class="bar-fill" style="width:${(c/data.length)*100}%;min-width:3px;background:${c<=5?"#ff9f1a":"#5bc0fa"}"></div></div>
    <span style="font-size:11px;color:#5a6577">${((c/data.length)*100).toFixed(1)}%</span></div></td></tr>`).join("")}
    </tbody></table></div></div>`;
}

function renderGroups() {
  const data=APP.currentData; const gs={};
  data.forEach(r=>{const k=`${r.group_dt||"?"} → ${r.group_kt||"?"}`;if(!gs[k])gs[k]={count:0,amount:0,riskSum:0};gs[k].count++;gs[k].amount+=r.amount;gs[k].riskSum+=r.risk_score});
  const rows=Object.entries(gs).map(([k,v])=>({pair:k,...v,avg:v.riskSum/v.count})).sort((a,b)=>b.avg-a.avg).slice(0,20);
  return`<div class="fade-in"><div class="desc-text">Сводка по группам маппинга</div>
    <div class="table-wrap"><table><thead><tr><th>Группа</th><th class="text-right">Кол-во</th><th class="text-right">Сумма</th><th>Ср. риск</th></tr></thead><tbody>
    ${rows.map(r=>{const col=r.avg>=50?RC.HIGH:r.avg>=30?RC.MEDIUM:r.avg>=15?RC.LOW:RC.NORMAL;
      return`<tr><td>${esc(r.pair)}</td><td class="text-right">${r.count}</td><td class="text-right mono">${fmt(r.amount)} ₸</td>
      <td><div style="display:flex;align-items:center;gap:8px"><div class="bar-track" style="width:80px"><div class="bar-fill" style="width:${Math.min(100,r.avg)}%;background:${col}"></div></div>
      <span class="mono" style="font-weight:600;color:${col}">${r.avg.toFixed(0)}</span></div></td></tr>`;
    }).join("")}</tbody></table></div></div>`;
}

// ═══════════════════════════════════════════════════════════
// COMPARISON PAGE
// ═══════════════════════════════════════════════════════════
function renderCompare() {
  const c = APP.compareResult;
  if (!c) return "<div>Нет данных для сравнения</div>";

  const deltaOps = c.curLen - c.prevLen;
  const deltaAmt = c.curTotal - c.prevTotal;
  const deltaSusp = c.curCounts.HIGH + c.curCounts.MEDIUM - c.prevCounts.HIGH - c.prevCounts.MEDIUM;

  function compCard(label, curVal, prevVal, format, color) {
    const d = curVal - prevVal;
    const p = prevVal > 0 ? ((d/prevVal)*100).toFixed(1) : (curVal>0?"+100":"0");
    const dc = d > 0 ? "change-up" : d < 0 ? "change-down" : "change-same";
    const arrow = d > 0 ? "▲" : d < 0 ? "▼" : "—";
    return `<div class="compare-card">
      <div class="compare-label">${label}</div>
      <div class="compare-values">
        <span class="compare-old">${format(prevVal)}</span>
        <span class="compare-new" style="color:${color||'#e8ecf2'}">${format(curVal)}</span>
        <span class="compare-delta ${dc}">${arrow} ${Math.abs(p)}%</span>
      </div>
    </div>`;
  }

  // significant group changes
  const sigChanges = c.groupChanges.filter(g => Math.abs(g.pct) > 10 || g.isNew || g.isRemoved).slice(0, 15);

  return `<div class="fade-in">
    <div style="font-size:18px;font-weight:700;color:#e8ecf2;margin-bottom:6px">Сравнение: ${esc(APP.currentName)} vs ${esc(APP.prevName)}</div>
    <div class="desc-text">Изменения между периодами</div>

    <div class="cards" style="margin-bottom:24px">
      ${compCard("Операций", c.curLen, c.prevLen, v=>v, "#5bc0fa")}
      ${compCard("Общая сумма", c.curTotal, c.prevTotal, v=>fmt(v)+" ₸", "#e8ecf2")}
      ${compCard("HIGH Risk", c.curCounts.HIGH, c.prevCounts.HIGH, v=>v, RC.HIGH)}
      ${compCard("MEDIUM Risk", c.curCounts.MEDIUM, c.prevCounts.MEDIUM, v=>v, RC.MEDIUM)}
    </div>

    <div class="panel">
      <div class="panel-title">📊 Изменения по статьям (группам счетов)</div>
      ${sigChanges.length === 0 ? '<div style="color:#5a6577;font-size:13px">Значительных изменений не обнаружено</div>' : ''}
      <div class="table-wrap" style="margin-top:8px"><table><thead><tr>
        <th>Группа</th>
        <th class="text-right">Прошлый период</th>
        <th class="text-right">Текущий период</th>
        <th class="text-right">Изменение</th>
        <th>Ср. риск</th>
        <th>Статус</th>
      </tr></thead><tbody>
      ${sigChanges.map(g => {
        const dc = g.pct > 0 ? "change-up" : g.pct < 0 ? "change-down" : "change-same";
        const arrow = g.delta > 0 ? "▲" : g.delta < 0 ? "▼" : "—";
        const riskCol = g.curAvgRisk >= 50 ? RC.HIGH : g.curAvgRisk >= 30 ? RC.MEDIUM : g.curAvgRisk >= 15 ? RC.LOW : RC.NORMAL;
        let status = "";
        if (g.isNew) status = '<span class="risk-badge" style="background:#3ddc8422;color:#3ddc84;border:1px solid #3ddc8444">НОВАЯ</span>';
        else if (g.isRemoved) status = '<span class="risk-badge" style="background:#ff3b5c22;color:#ff3b5c;border:1px solid #ff3b5c44">УБРАНА</span>';
        else if (Math.abs(g.pct) > 50) status = '<span class="risk-badge" style="background:#ff9f1a22;color:#ff9f1a;border:1px solid #ff9f1a44">⚠ РЕЗКОЕ</span>';
        else status = '<span style="color:#5a6577">—</span>';
        return `<tr>
          <td style="font-weight:600">${esc(g.group)}</td>
          <td class="text-right mono">${fmtFull(g.prevAmt)} ₸</td>
          <td class="text-right mono">${fmtFull(g.curAmt)} ₸</td>
          <td class="text-right ${dc}" style="font-weight:600">${arrow} ${Math.abs(g.pct).toFixed(1)}%</td>
          <td><span class="mono" style="color:${riskCol};font-weight:600">${g.curAvgRisk.toFixed(0)}</span></td>
          <td>${status}</td>
        </tr>`;
      }).join("")}
      </tbody></table></div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-title">🆕 Новые контрагенты (${c.newCPs.length})</div>
        ${c.newCPs.length === 0 ? '<div style="color:#5a6577;font-size:13px">Новых контрагентов нет</div>' :
          `<div style="max-height:250px;overflow-y:auto">${c.newCPs.slice(0,30).map(cp =>
            `<div style="padding:6px 10px;border-bottom:1px solid #1e2536;font-size:13px;color:#c4cedb">${esc(cp)}</div>`
          ).join("")}${c.newCPs.length>30?`<div style="padding:8px;color:#5a6577;font-size:12px">…и ещё ${c.newCPs.length-30}</div>`:""}</div>`}
      </div>
      <div class="panel">
        <div class="panel-title">🔗 Новые пары счетов (${c.newPairs.length})</div>
        ${c.newPairs.length === 0 ? '<div style="color:#5a6577;font-size:13px">Новых пар нет</div>' :
          `<div style="max-height:250px;overflow-y:auto">${c.newPairs.slice(0,30).map(p =>
            `<div style="padding:6px 10px;border-bottom:1px solid #1e2536;font-size:13px;font-family:'JetBrains Mono',monospace;color:#c4cedb">${p}</div>`
          ).join("")}${c.newPairs.length>30?`<div style="padding:8px;color:#5a6577;font-size:12px">…и ещё ${c.newPairs.length-30}</div>`:""}</div>`}
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">📋 Риск-профиль: сравнение</div>
      <div style="display:flex;gap:24px;flex-wrap:wrap">
        ${["HIGH","MEDIUM","LOW","NORMAL"].map(l => {
          const d = c.curCounts[l] - c.prevCounts[l];
          const dc = d>0?"change-up":d<0?"change-down":"change-same";
          return `<div style="text-align:center">
            <div style="font-size:11px;color:#6b7a90;margin-bottom:4px">${l}</div>
            <div style="font-size:20px;font-weight:700;color:${RC[l]}">${c.prevCounts[l]} → ${c.curCounts[l]}</div>
            <div class="${dc}" style="font-size:12px;font-weight:600">${d>0?"+":""}${d}</div>
          </div>`;
        }).join("")}
      </div>
    </div>
  </div>`;
}

function render() {
  const el = document.getElementById("mainContent");
  switch(APP.tab) {
    case "upload": el.innerHTML = renderUpload(); setupDragDrop(); break;
    case "overview": el.innerHTML = renderOverview(); break;
    case "charts": el.innerHTML = renderCharts(); drawCharts(); break;
    case "journal": el.innerHTML = renderTable(APP.currentData, true); break;
    case "suspicious": el.innerHTML = renderTable(APP.currentData.filter(r=>r.risk_score>=40).sort((a,b)=>b.risk_score-a.risk_score), false); break;
    case "pairs": el.innerHTML = renderPairs(); break;
    case "groups": el.innerHTML = renderGroups(); break;
    case "compare": el.innerHTML = renderCompare(); break;
    case "constructor": el.innerHTML = renderConstructor(); break;
    case "ai": el.innerHTML = renderAI(); setupAIChat(); break;
  }
}

          <input class="ctor-input" id="newRangeScore" type="number" min="1" max="100" value="15" placeholder="Баллы" style="max-width:80px">

function toggleCheck(id, val) {
  const c = APP.checks.find(c=>c.id===id);
  if (c) c.enabled = val;
}
function setCheckScore(id, val) {
  const c = APP.checks.find(c=>c.id===id);
  if (c) c.score = Math.max(0, Math.min(100, parseInt(val)||0));
}
function toggleCustomCheck(i, val) { APP.customChecks[i].enabled = val; }
function setCustomScore(i, val) { APP.customChecks[i].score = Math.max(0, Math.min(100, parseInt(val)||0)); }
function deleteCustomCheck(i) { APP.customChecks.splice(i,1); render(); }

function addKeywordCheck() {
  const label = document.getElementById("newKwLabel").value.trim();
  const words = document.getElementById("newKwWords").value.trim();
  const score = parseInt(document.getElementById("newKwScore").value)||20;
  if (!label || !words) return alert("Заполните название и ключевые слова");
  APP.customChecks.push({
    id: Date.now().toString(),
    label, type:"keyword",
    keywords: words.split(",").map(w=>w.trim()).filter(Boolean),
    score, enabled:true
  });
  render();
}
function addRangeCheck() {
  const label = document.getElementById("newRangeLabel").value.trim();
  const minAmt = document.getElementById("newRangeMin").value;
  const maxAmt = document.getElementById("newRangeMax").value;
  const score = parseInt(document.getElementById("newRangeScore").value)||15;
  if (!label) return alert("Заполните название проверки");
  APP.customChecks.push({
    id: Date.now().toString(),
    label, type:"range",
    minAmt: minAmt !== "" ? Number(minAmt) : null,
    maxAmt: maxAmt !== "" ? Number(maxAmt) : null,
    score, enabled:true
  });
  render();
}

function applyChecks() {
  if (!APP.currentData) return;
  // Пересчёт с учётом маппинга
  let d = APP.currentData;
  d = calculateRisk(d, APP.prevData || null);
  APP.currentData = d;
  if (APP.prevData) APP.compareResult = compareData(d, APP.prevData);
  APP.tab = "overview";
  renderTabs();
  renderHeader();
  render();
  // Уведомление
  const el = document.createElement("div");
  el.style.cssText = "position:fixed;top:20px;right:24px;background:#3ddc8422;border:1px solid #3ddc8444;color:#3ddc84;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;animation:fadeIn .3s";
  el.textContent = "✓ Проверки применены — данные пересчитаны!";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}

let _charts = {};

function destroyCharts() {
  Object.values(_charts).forEach(c => { try { c.destroy(); } catch(e){} });
  _charts = {};
}

function renderCharts() {
  if (!APP.currentData) return `<div style="text-align:center;padding:40px;color:#5a6577">Загрузите файл для просмотра диаграмм</div>`;
  return `<div class="fade-in">
    <div style="font-size:18px;font-weight:700;color:#e8ecf2;margin-bottom:18px">◉ Диаграммы</div>

      <div class="chart-card"><div class="chart-card-title">🍕 Распределение по уровню риска</div><div class="chart-wrap"><canvas id="chartRisk"></canvas></div></div>
      <div class="chart-card"><div class="chart-card-title">📊 Топ флагов риска</div><div class="chart-wrap"><canvas id="chartFlags"></canvas></div></div>

      <div class="chart-card"><div class="chart-card-title">⚖️ Распределение операций по счетам</div><div class="chart-wrap"><canvas id="chartAccounts"></canvas></div></div>
    </div>
  </div>`;
}

function drawCharts() {
  destroyCharts();
  if (!APP.currentData) return;
  const data = APP.currentData;

  const cfg = {
    plugins: { legend: { labels: { color:"#8e9baf", font:{family:"DM Sans",size:12} } } },
    scales: {}
  };
  const axisStyle = { ticks:{color:"#6b7a90",font:{size:11}}, grid:{color:"#1a2133"} };

  // 1. Pie — риск
  const riskCounts = {HIGH:0,MEDIUM:0,LOW:0,NORMAL:0};
  data.forEach(r=>riskCounts[r.risk_level]++);
  _charts.risk = new Chart(document.getElementById("chartRisk"), {
    type:"doughnut",
    data:{
      labels:["HIGH","MEDIUM","LOW","NORMAL"],
      datasets:[{data:[riskCounts.HIGH,riskCounts.MEDIUM,riskCounts.LOW,riskCounts.NORMAL],
        backgroundColor:["#ff3b5c99","#ff9f1a99","#5bc0fa99","#3ddc8499"],
        borderColor:["#ff3b5c","#ff9f1a","#5bc0fa","#3ddc84"],borderWidth:1}]
    },
    options:{...cfg, cutout:"60%", plugins:{...cfg.plugins, tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw} (${(ctx.raw/data.length*100).toFixed(1)}%)`}}}}
  });

  // 2. Bar — топ флагов
  const flagCounts = {};
  data.forEach(r=>{if(r.risk_flags)r.risk_flags.split(" | ").forEach(f=>{if(f)flagCounts[f]=(flagCounts[f]||0)+1})});
  const topFlags = Object.entries(flagCounts).sort((a,b)=>b[1]-a[1]).slice(0,7);
  _charts.flags = new Chart(document.getElementById("chartFlags"), {
    type:"bar",
    data:{
      labels: topFlags.map(([f])=>FL[f]||f),
      datasets:[{data:topFlags.map(([,c])=>c),backgroundColor:"#3d7af588",borderColor:"#5bc0fa",borderWidth:1,borderRadius:4}]
    },
    options:{...cfg, indexAxis:"y", plugins:{...cfg.plugins,legend:{display:false}},
      scales:{x:{...axisStyle},y:{...axisStyle,ticks:{...axisStyle.ticks,font:{size:10}}}}}
  });

  // 3. Line — динамика по датам
  const byDate = {};
  data.forEach(r=>{if(r.period){byDate[r.period]=(byDate[r.period]||0)+1}});
  const sortedDates = Object.keys(byDate).sort();
  const byDateHigh = {};
  data.filter(r=>r.risk_level==="HIGH").forEach(r=>{if(r.period)byDateHigh[r.period]=(byDateHigh[r.period]||0)+1});
  _charts.dynamic = new Chart(document.getElementById("chartDynamic"), {
    type:"line",
    data:{
      labels: sortedDates,
      datasets:[
        {label:"Все операции",data:sortedDates.map(d=>byDate[d]||0),borderColor:"#5bc0fa",backgroundColor:"#5bc0fa18",fill:true,tension:.3,pointRadius:2},
        {label:"HIGH риск",data:sortedDates.map(d=>byDateHigh[d]||0),borderColor:"#ff3b5c",backgroundColor:"#ff3b5c18",fill:true,tension:.3,pointRadius:2}
      ]
    },
    options:{...cfg, scales:{x:{...axisStyle,ticks:{...axisStyle.ticks,maxTicksLimit:10,maxRotation:30}},y:{...axisStyle}}}
  });

  // 4. Bar — топ контрагентов по сумме
  const cpSums = {};
  data.forEach(r=>{if(r.counterparty&&r.counterparty.trim())cpSums[r.counterparty]=(cpSums[r.counterparty]||0)+r.amount});
  const topCPs = Object.entries(cpSums).sort((a,b)=>b[1]-a[1]).slice(0,8);
  _charts.cp = new Chart(document.getElementById("chartCounterparty"), {
    type:"bar",
    data:{
      labels:topCPs.map(([cp])=>cp.length>18?cp.slice(0,18)+"…":cp),
      datasets:[{data:topCPs.map(([,s])=>Math.round(s/1000)),backgroundColor:"#7c3aed88",borderColor:"#a78bfa",borderWidth:1,borderRadius:4}]
    },
    options:{...cfg, plugins:{...cfg.plugins,legend:{display:false},tooltip:{callbacks:{label:ctx=>`${(ctx.raw).toLocaleString("ru-RU")} тыс ₸`}}},
      scales:{x:{...axisStyle,ticks:{...axisStyle.ticks,maxRotation:35,font:{size:10}}},y:{...axisStyle,title:{display:true,text:"тыс ₸",color:"#5a6577"}}}}
  });

  // 5. Bar — распределение по счетам (top дебет)
  const accSums = {};
  data.forEach(r=>{if(r.account_dt)accSums[r.account_dt]=(accSums[r.account_dt]||0)+r.debit});
  const topAcc = Object.entries(accSums).sort((a,b)=>b[1]-a[1]).slice(0,10);
  _charts.acc = new Chart(document.getElementById("chartAccounts"), {
    type:"bar",
    data:{
      labels:topAcc.map(([a])=>a),
      datasets:[{label:"Дебет (тыс ₸)",data:topAcc.map(([,s])=>Math.round(s/1000)),backgroundColor:"#ff9f1a88",borderColor:"#ff9f1a",borderWidth:1,borderRadius:4}]
    },
    options:{...cfg, plugins:{...cfg.plugins,legend:{display:false}},
      scales:{x:{...axisStyle},y:{...axisStyle,title:{display:true,text:"тыс ₸",color:"#5a6577"}}}}
  });
}

function buildAuditContext() {
  const data = APP.currentData;
  if (!data || data.length === 0) return "";

  const counts = {HIGH:0,MEDIUM:0,LOW:0,NORMAL:0};
  let totalAmt = 0, suspAmt = 0;
  data.forEach(r => { counts[r.risk_level]++; totalAmt += r.amount; if (r.risk_score >= 40) suspAmt += r.amount; });

  const flagCounts = {};
  data.forEach(r => { if (r.risk_flags) r.risk_flags.split(" | ").forEach(f => { if (f) flagCounts[f] = (flagCounts[f]||0)+1; }); });
  const topFlags = Object.entries(flagCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const pairFreq = {};
  data.forEach(r => { pairFreq[r.pair] = (pairFreq[r.pair]||0)+1; });
  const topPairs = Object.entries(pairFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const cpRisk = {};
  data.forEach(r => {
    if (r.counterparty) {
      if (!cpRisk[r.counterparty]) cpRisk[r.counterparty] = {score:0, count:0};
      cpRisk[r.counterparty].score += r.risk_score;
      cpRisk[r.counterparty].count++;
    }
  });
  const topRiskyCPs = Object.entries(cpRisk)
    .map(([cp,v])=>({cp, avg: v.score/v.count, count: v.count}))
    .filter(x => x.avg >= 30)
    .sort((a,b)=>b.avg-a.avg).slice(0,5);

  const highRiskSamples = data.filter(r => r.risk_level === "HIGH").slice(0, 5).map(r =>
    `  - ${r.period} | ${r.document||"б/н"} | ${r.pair} | ${Math.round(r.amount).toLocaleString("ru-RU")} ₸ | Флаги: ${r.risk_flags}`
  );

  let ctx = `ДАННЫЕ АУДИТА (OPTRO Risk Engine):
Файл: ${APP.currentName}
Всего операций: ${data.length}
Общая сумма: ${Math.round(totalAmt).toLocaleString("ru-RU")} ₸

РИСК-ПРОФИЛЬ:
- HIGH (≥70 баллов): ${counts.HIGH} операций
- MEDIUM (40-69): ${counts.MEDIUM} операций
- LOW (20-39): ${counts.LOW} операций
- NORMAL (<20): ${counts.NORMAL} операций
- Подозрительных сумм (HIGH+MEDIUM): ${Math.round(suspAmt).toLocaleString("ru-RU")} ₸

ТОП ФЛАГИ РИСКА:
${topFlags.map(([f,c])=>`- ${FL[f]||f}: ${c} операций`).join("\n")}

ТОП ПАРЫ СЧЕТОВ:
${topPairs.map(([p,c])=>`- ${p}: ${c} раз`).join("\n")}`;

  if (topRiskyCPs.length > 0) {
    ctx += `\n\nКОНТРАГЕНТЫ С ВЫСОКИМ РИСКОМ:\n${topRiskyCPs.map(x=>`- ${x.cp}: средний балл ${x.avg.toFixed(0)}, ${x.count} операций`).join("\n")}`;
  }

  if (highRiskSamples.length > 0) {
    ctx += `\n\nПРИМЕРЫ HIGH RISK ОПЕРАЦИЙ:\n${highRiskSamples.join("\n")}`;
  }

  if (APP.compareResult) {
    const c = APP.compareResult;
    ctx += `\n\nСРАВНЕНИЕ С ПРЕДЫДУЩИМ ПЕРИОДОМ (${APP.prevName}):
- Операций: ${c.prevLen} → ${c.curLen}
- HIGH Risk: ${c.prevCounts.HIGH} → ${c.curCounts.HIGH}
- Новых контрагентов: ${c.newCPs.length}
- Новых пар счетов: ${c.newPairs.length}`;
  }

  return ctx;
}

function formatAIText(text) {
  return esc(text)
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<div style="font-size:13px;font-weight:700;color:#5bc0fa;margin:8px 0 4px">$1</div>')
    .replace(/^## (.+)$/gm, '<div style="font-size:14px;font-weight:700;color:#e8ecf2;margin:10px 0 4px">$1</div>')
    .replace(/^- (.+)$/gm, '<div style="padding-left:12px;margin:2px 0">• $1</div>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function setupAIChat() {
  const msgs = document.getElementById("aiMessages");
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function saveApiKey() {
  const input = document.getElementById("apiKeyInput");
  if (!input) return;
  const key = input.value.trim();
  if (!key.startsWith("gsk_")) {
    input.style.borderColor = "#ff3b5c";
    input.placeholder = "Неверный формат — должен начинаться с gsk_...";
    setTimeout(() => { input.style.borderColor = ""; }, 2000);
    return;
  }
  APP.apiKey = key;
  render();
}

function clearApiKey() {
  APP.apiKey = "";
  render();
}

function sendFromInput() {
  const input = document.getElementById("aiInput");
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  input.style.height = "auto";
  sendAIMessage(text);
}

async function sendAIMessage(userText) {
  if (APP.aiLoading || !userText.trim()) return;
  if (!APP.apiKey) {
    alert("Сначала введите API-ключ в поле выше.");
    return;
  }

  APP.aiMessages.push({role:"user", content: userText});
  APP.aiLoading = true;
  render();

  const auditContext = buildAuditContext();

  const systemPrompt = `Ты — опытный аудитор-аналитик и ИИ-ассистент системы OPTRO Risk Engine.
Твоя задача — помогать аудиторам анализировать журнал операций 1С и выявлять риски.

${auditContext}

Отвечай по-русски, конкретно и профессионально. Используй данные выше для точных ответов.
Если указываешь числа — бери их из контекста. Будь лаконичен но информативен.
Используй **жирный** для ключевых терминов. Можешь использовать списки с -.`;

  const messages = APP.aiMessages.map(m => ({role: m.role, content: m.content}));

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${APP.apiKey}`
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        max_tokens: 1000,
        messages: [
          {role: "system", content: systemPrompt},
          ...messages
        ]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(()=>({}));
      const msg = err?.error?.message || `HTTP ${response.status}`;
      throw new Error(msg);
    }

    const data = await response.json();
    const reply = data.choices && data.choices[0] && data.choices[0].message
      ? data.choices[0].message.content
      : "Извините, не удалось получить ответ. Попробуйте ещё раз.";

    APP.aiMessages.push({role:"assistant", content: reply});
  } catch(err) {
    APP.aiMessages.push({role:"assistant", content: `⚠️ Ошибка: ${err.message}`});
  }

  APP.aiLoading = false;
  render();
}

function exportToExcel() {
  if (!APP.currentData) return;
  const wb = XLSX.utils.book_new();

  // ── ЛИСТ 1: Полный журнал ──
  const journalHeaders = ["Дата","Документ","Аналитика Дт","Аналитика Кт","Счет Дт","Группа Дт","Счет Кт","Группа Кт","Дебет","Кредит","Сумма","Риск-скор","Уровень риска","Флаги риска"];
  const journalRows = APP.currentData.map(r => [
    r.period, r.document, r.analytics_dt, r.analytics_kt,
    r.account_dt, r.group_dt, r.account_kt, r.group_kt,
    r.debit, r.credit, r.amount,
    r.risk_score, r.risk_level,
    r.risk_flags ? r.risk_flags.split(" | ").map(f => FL[f]||f).join("; ") : ""
  ]);
  const wsJournal = XLSX.utils.aoa_to_sheet([journalHeaders, ...journalRows]);

  // Ширина колонок
  wsJournal["!cols"] = [
    {wch:12},{wch:28},{wch:22},{wch:22},{wch:10},{wch:18},{wch:10},{wch:18},
    {wch:14},{wch:14},{wch:14},{wch:10},{wch:12},{wch:50}
  ];

  // Цвет заголовков (светло-синий)
  const headerStyle = {font:{bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1E3A5F"}},alignment:{horizontal:"center"}};
  journalHeaders.forEach((_,i) => {
    const cellRef = XLSX.utils.encode_cell({r:0, c:i});
    if (!wsJournal[cellRef]) wsJournal[cellRef] = {};
    wsJournal[cellRef].s = headerStyle;
  });

  // Цвет строк по уровню риска
  const riskFill = {HIGH:"4D1A1A", MEDIUM:"3D2800", LOW:"0D2033", NORMAL:"0D1A0D"};
  const riskFont = {HIGH:"FF3B5C", MEDIUM:"FF9F1A", LOW:"5BC0FA", NORMAL:"3DDC84"};
  APP.currentData.forEach((r, rowIdx) => {
    for (let c = 0; c < journalHeaders.length; c++) {
      const cellRef = XLSX.utils.encode_cell({r: rowIdx+1, c});
      if (!wsJournal[cellRef]) wsJournal[cellRef] = {v:"", t:"s"};
      wsJournal[cellRef].s = {
        fill: {fgColor:{rgb: riskFill[r.risk_level]||"0D1420"}},
        font: c === 12 ? {bold:true, color:{rgb: riskFont[r.risk_level]||"C4CEDB"}} : {color:{rgb:"C4CEDB"}},
        border: {bottom:{style:"thin",color:{rgb:"1E2536"}}}
      };
    }
  });

  XLSX.utils.book_append_sheet(wb, wsJournal, "Журнал операций");

  // ── ЛИСТ 2: Статистика ──
  const data = APP.currentData;
  const counts = {HIGH:0,MEDIUM:0,LOW:0,NORMAL:0};
  let totalAmt=0, suspAmt=0;
  data.forEach(r => { counts[r.risk_level]++; totalAmt+=r.amount; if(r.risk_score>=40) suspAmt+=r.amount; });

  const flagCounts = {};
  data.forEach(r => { if(r.risk_flags) r.risk_flags.split(" | ").forEach(f=>{if(f) flagCounts[f]=(flagCounts[f]||0)+1}); });
  const topFlags = Object.entries(flagCounts).sort((a,b)=>b[1]-a[1]);

  const pairFreq = {};
  data.forEach(r => { pairFreq[r.pair]=(pairFreq[r.pair]||0)+1; });
  const topPairs = Object.entries(pairFreq).sort((a,b)=>b[1]-a[1]).slice(0,10);

  const statsData = [
    ["СВОДНАЯ СТАТИСТИКА — " + APP.currentName],
    ["Дата отчёта:", new Date().toLocaleDateString("ru-RU")],
    [],
    ["ОБЩИЕ ПОКАЗАТЕЛИ"],
    ["Всего операций:", data.length],
    ["Общая сумма (₸):", Math.round(totalAmt)],
    ["Сумма подозрительных операций (₸):", Math.round(suspAmt)],
    ["% подозрительных от общей суммы:", totalAmt>0 ? (suspAmt/totalAmt*100).toFixed(1)+"%" : "0%"],
    [],
    ["РАСПРЕДЕЛЕНИЕ ПО УРОВНЮ РИСКА"],
    ["Уровень","Кол-во операций","% от всего"],
    ["HIGH (≥70)", counts.HIGH, data.length>0?(counts.HIGH/data.length*100).toFixed(1)+"%":"0%"],
    ["MEDIUM (40-69)", counts.MEDIUM, data.length>0?(counts.MEDIUM/data.length*100).toFixed(1)+"%":"0%"],
    ["LOW (20-39)", counts.LOW, data.length>0?(counts.LOW/data.length*100).toFixed(1)+"%":"0%"],
    ["NORMAL (<20)", counts.NORMAL, data.length>0?(counts.NORMAL/data.length*100).toFixed(1)+"%":"0%"],
    [],
    ["ТОП ФЛАГИ РИСКА"],
    ["Флаг риска","Кол-во","% от операций"],
    ...topFlags.map(([f,c]) => [FL[f]||f, c, (c/data.length*100).toFixed(1)+"%"]),
    [],
    ["ТОП ПАРЫ СЧЕТОВ"],
    ["Пара счетов","Кол-во"],
    ...topPairs.map(([p,c]) => [p, c])
  ];
  const wsStats = XLSX.utils.aoa_to_sheet(statsData);
  wsStats["!cols"] = [{wch:40},{wch:20},{wch:16}];
  // Заголовки секций жирным
  [[0,0],[3,0],[9,0],[16,0],[17,0],[18+topFlags.length+1,0],[18+topFlags.length+2,0]].forEach(([r,c])=>{
    const ref = XLSX.utils.encode_cell({r,c});
    if (wsStats[ref]) wsStats[ref].s = {font:{bold:true,color:{rgb:"5BC0FA"}},fill:{fgColor:{rgb:"0D1220"}}};
  });
  XLSX.utils.book_append_sheet(wb, wsStats, "Статистика");

  // ── ЛИСТ 3: Сравнение периодов ──
  if (APP.compareResult) {
    const c = APP.compareResult;
    const compareData = [
      ["СРАВНЕНИЕ ПЕРИОДОВ"],
      ["Текущий файл:", APP.currentName, "Предыдущий файл:", APP.prevName],
      [],
      ["ПОКАЗАТЕЛЬ","ПРЕДЫДУЩИЙ ПЕРИОД","ТЕКУЩИЙ ПЕРИОД","ИЗМЕНЕНИЕ","ИЗМЕНЕНИЕ %"],
      ["Кол-во операций", c.prevLen, c.curLen, c.curLen-c.prevLen, c.prevLen>0?((c.curLen-c.prevLen)/c.prevLen*100).toFixed(1)+"%":"—"],
      ["Общая сумма (₸)", Math.round(c.prevTotal), Math.round(c.curTotal), Math.round(c.curTotal-c.prevTotal), c.prevTotal>0?((c.curTotal-c.prevTotal)/c.prevTotal*100).toFixed(1)+"%":"—"],
      ["HIGH Risk", c.prevCounts.HIGH, c.curCounts.HIGH, c.curCounts.HIGH-c.prevCounts.HIGH, ""],
      ["MEDIUM Risk", c.prevCounts.MEDIUM, c.curCounts.MEDIUM, c.curCounts.MEDIUM-c.prevCounts.MEDIUM, ""],
      ["Подозрит. сумма (₸)", Math.round(c.prevSusp), Math.round(c.curSusp), Math.round(c.curSusp-c.prevSusp), ""],
      [],
      ["ИЗМЕНЕНИЯ ПО ГРУППАМ СЧЕТОВ"],
      ["Группа","Пред. период (₸)","Тек. период (₸)","Изменение (₸)","Изменение %","Статус"],
      ...c.groupChanges.slice(0,20).map(g => [
        g.group,
        Math.round(g.prevAmt),
        Math.round(g.curAmt),
        Math.round(g.delta),
        g.pct.toFixed(1)+"%",
        g.isNew?"НОВАЯ":g.isRemoved?"УБРАНА":Math.abs(g.pct)>50?"⚠ РЕЗКОЕ":""
      ]),
      [],
      ["НОВЫЕ КОНТРАГЕНТЫ (" + c.newCPs.length + ")"],
      ...c.newCPs.slice(0,50).map(cp => [cp]),
      [],
      ["НОВЫЕ ПАРЫ СЧЕТОВ (" + c.newPairs.length + ")"],
      ...c.newPairs.slice(0,30).map(p => [p])
    ];
    const wsCompare = XLSX.utils.aoa_to_sheet(compareData);
    wsCompare["!cols"] = [{wch:30},{wch:20},{wch:20},{wch:20},{wch:14},{wch:12}];
    XLSX.utils.book_append_sheet(wb, wsCompare, "Сравнение периодов");
  }

  // ── Сохранение ──
  const dateStr = new Date().toISOString().slice(0,10);
  const fileName = `OPTRO_Report_${APP.currentName.replace(/\.[^.]+$/,"")}_${dateStr}.xlsx`;
  XLSX.writeFile(wb, fileName);
}

// ═══════════════════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════════════════
function handleFile(input, type) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    if (type === "current") {
      APP.currentFile = e.target.result;
      APP.currentName = file.name;
      showFileInfo("currentFileInfo", file);
    } else {
      APP.prevFile = e.target.result;
      APP.prevName = file.name;
      showFileInfo("prevFileInfo", file);
    }
    updateAnalyzeBtn();
  };
  reader.readAsArrayBuffer(file);
}

function showFileInfo(elId, file) {
  const size = file.size > 1e6 ? (file.size/1e6).toFixed(1)+" МБ" : (file.size/1024).toFixed(0)+" КБ";
  document.getElementById(elId).innerHTML = `
    <div class="file-loaded">
      <span style="font-size:18px">📄</span>
      <span class="file-loaded-name">${esc(file.name)}</span>
      <span class="file-loaded-size">${size}</span>
      <button class="file-loaded-remove" onclick="removeFile('${elId==='currentFileInfo'?'current':'prev'}')" title="Удалить">✕</button>
    </div>`;
}

function removeFile(type) {
  if (type === "current") {
    APP.currentFile = null; APP.currentName = "";
    document.getElementById("currentFileInfo").innerHTML = "";
    document.getElementById("fileCurrent").value = "";
  } else {
    APP.prevFile = null; APP.prevName = "";
    document.getElementById("prevFileInfo").innerHTML = "";
    document.getElementById("filePrev").value = "";
  }
  updateAnalyzeBtn();
}

function updateAnalyzeBtn() {
  const btn = document.getElementById("btnAnalyze");
  if (btn) btn.disabled = !APP.currentFile;
}

function setupDragDrop() {
  ["dropCurrent","dropPrev"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("drag-over"); });
    el.addEventListener("dragleave", () => el.classList.remove("drag-over"));
    el.addEventListener("drop", e => {
      e.preventDefault(); el.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const type = id === "dropCurrent" ? "current" : "prev";
      const inputId = type === "current" ? "fileCurrent" : "filePrev";
      // simulate
      const dt = new DataTransfer();
      dt.items.add(file);
      document.getElementById(inputId).files = dt.files;
      handleFile(document.getElementById(inputId), type);
    });
  });
}

// ═══════════════════════════════════════════════════════════
// RUN ANALYSIS
// ═══════════════════════════════════════════════════════════
function runAnalysis() {
  const prog = document.getElementById("progressArea");
  if (prog) prog.innerHTML = `<div class="progress-bar"><div class="progress-fill" id="pFill" style="width:10%"></div></div>
    <div style="text-align:center;font-size:13px;color:#7a8da6" id="pText">Загрузка файлов...</div>`;

  setTimeout(() => {
    try {
      setProgress(20, "Парсинг текущего периода...");

      // Parse previous period first (for history comparison)
      let prevData = null;
      if (APP.prevFile) {
        setProgress(30, "Парсинг прошлого периода...");
        prevData = parseExcel(APP.prevFile);
        prevData = applyMapping(prevData, APP.mapping);
        prevData = calculateRisk(prevData, null);
        APP.prevData = prevData;
      }

      setProgress(50, "Парсинг текущего периода...");
      let currentData = parseExcel(APP.currentFile);

      setProgress(60, "Применяем маппинг...");
      currentData = applyMapping(currentData, APP.mapping);

      setProgress(70, "Считаем риск-скор...");
      currentData = calculateRisk(currentData, prevData);
      APP.currentData = currentData;

      setProgress(85, "Строим сравнение...");
      if (prevData) {
        APP.compareResult = compareData(currentData, prevData);
      } else {
        APP.compareResult = null;
      }

      setProgress(100, "Готово!");

      setTimeout(() => {
        APP.tab = "overview";
        renderTabs();
        renderHeader();
        render();
      }, 400);

    } catch(err) {
      if (prog) prog.innerHTML = `<div class="panel" style="border-color:#ff3b5c44">
        <div style="color:#ff3b5c;font-weight:600;margin-bottom:8px">❌ Ошибка</div>
        <div style="font-size:13px;color:#c4cedb">${esc(err.message)}</div>
        <div style="font-size:12px;color:#5a6577;margin-top:8px">Убедитесь, что файл — это Excel-выгрузка 1С с листом «general» и 8 колонками.</div>
      </div>`;
    }
  }, 100);
}

function setProgress(pct, text) {
  const fill = document.getElementById("pFill");
  const txt = document.getElementById("pText");
  if (fill) fill.style.width = pct + "%";
  if (txt) txt.textContent = text;
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
function setFilter(f){APP.filter=f;APP.page=0;render()}
function setSearch(q){APP.search=q;APP.page=0;render()}
function setSort(field){
  if(APP.sortField===field)APP.sortDir=APP.sortDir==="asc"?"desc":"asc";
  else{APP.sortField=field;APP.sortDir="desc"}
  APP.page=0;render();
}
function changePage(d){APP.page+=d;render()}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
renderTabs();
renderHeader();
render();
</script>
