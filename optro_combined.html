// ACTIONS
// ═══════════════════════════════════════════════════════
async function openTask(id) {
  STATE.selectedTask = STATE.tasks.find(t=>t.id===id);
  STATE.modal = 'task';
  await loadComments(id);
  render();
}

function openCreateTask() { STATE.modal='create'; render(); }
function closeModal() { STATE.modal=null; STATE.selectedTask=null; STATE.comments=[]; render(); }

async function createTask() {
  const title = document.getElementById('tTitle').value.trim();
  const assignee = document.getElementById('tAssignee').value;
  if (!title||!assignee) { toast('Заполните название и исполнителя','error'); return; }
  const {error} = await sb.from('tasks').insert({
    title,
    description: document.getElementById('tDesc').value.trim()||null,
    file_name: document.getElementById('tFile').value.trim()||null,
    assigned_to: assignee,
    assigned_by: STATE.profile.id,
    priority: document.getElementById('tPriority').value,
    deadline: document.getElementById('tDeadline').value||null,
    status: 'pending'
  });
  if (error) { toast('Ошибка: '+error.message,'error'); return; }
  toast('Задача создана!');
  closeModal();
  await loadData();
}

async function changeStatus(taskId, status) {
  const {error} = await sb.from('tasks').update({status}).eq('id', taskId);
  if (error) { toast('Ошибка','error'); return; }
  STATE.tasks = STATE.tasks.map(t=>t.id===taskId?{...t,status}:t);
  if (STATE.selectedTask?.id===taskId) STATE.selectedTask = {...STATE.selectedTask, status};
  toast('Статус обновлён');
  render();
}

async function addComment(taskId) {
  const text = document.getElementById('commentText').value.trim();
  if (!text) return;
  const {error} = await sb.from('comments').insert({task_id:taskId, author_id:STATE.profile.id, text});
  if (error) { toast('Ошибка','error'); return; }
  await loadComments(taskId);
  render();
}

async function approveUser(id) {
  const role = document.getElementById(`role_${id}`)?.value || 'auditor';
  const {error} = await sb.from('profiles').update({status:'active', role}).eq('id', id);
  if (error) { toast('Ошибка','error'); return; }
  toast('Сотрудник одобрен!');
  STATE.profiles = STATE.profiles.map(p=>p.id===id?{...p,status:'active',role}:p);
  render();
}

async function rejectUser(id) {
  if (!confirm('Отклонить заявку?')) return;
  const {error} = await sb.from('profiles').update({status:'blocked'}).eq('id', id);
  if (error) { toast('Ошибка','error'); return; }
  toast('Заявка отклонена','info');
  STATE.profiles = STATE.profiles.map(p=>p.id===id?{...p,status:'blocked'}:p);
  render();
}

async function changeRole(id, role) {
  const {error} = await sb.from('profiles').update({role}).eq('id', id);
  if (error) { toast('Ошибка','error'); return; }
  toast('Роль изменена');
  STATE.profiles = STATE.profiles.map(p=>p.id===id?{...p,role}:p);
}

async function blockUser(id) {
  if (!confirm('Заблокировать сотрудника?')) return;
  const {error} = await sb.from('profiles').update({status:'blocked'}).eq('id', id);
  if (error) { toast('Ошибка','error'); return; }
  toast('Пользователь заблокирован','info');
  STATE.profiles = STATE.profiles.map(p=>p.id===id?{...p,status:'blocked'}:p);
  render();
}

// ═══════════════════════════════════════════════════════
// UNIFIED RENDER SYSTEM
// ═══════════════════════════════════════════════════════
function renderApp() {
  if (!TS.user || !TS.profile) { renderAuth(); return; }

  const pending = TS.profiles.filter(p=>p.status==='pending').length;
  const myTasks = TS.tasks.filter(t=>t.assigned_to===TS.profile.id && t.status!=='completed');
  const isEngine = ['upload','overview','charts','journal','suspicious','pairs','groups','compare','constructor','ai'].includes(TS.page);

  document.getElementById('app').innerHTML = `
  <div class="app">
    <div class="sidebar">
      <div class="sb-logo">
        <div class="sb-logo-icon">O</div>
        <div><div class="sb-logo-text">OPTRO</div><div class="sb-logo-sub">Risk Engine</div></div>
      </div>
      <div class="sb-nav">
        <div class="sb-section">Главное</div>
        <button class="sb-item ${TS.page==='dashboard'?'active':''}" onclick="navTo('dashboard')">
          <span class="sb-item-icon">◈</span> Дашборд
        </button>
        <button class="sb-item ${TS.page==='tasks'?'active':''}" onclick="navTo('tasks')">
          <span class="sb-item-icon">▤</span> Задачи
          ${myTasks.length>0?`<span class="sb-badge">${myTasks.length}</span>`:''}
        </button>
        <button class="sb-item ${TS.page==='mytasks'?'active':''}" onclick="navTo('mytasks')">
          <span class="sb-item-icon">◎</span> Мои задачи
        </button>
        <div class="sb-section" style="margin-top:6px">Risk Engine</div>
        <button class="sb-item ${TS.page==='upload'?'active':''}" onclick="navTo('upload')">
          <span class="sb-item-icon">⬆</span> Загрузка 1С
        </button>
        ${APP.currentData ? `
        <button class="sb-item ${TS.page==='overview'?'active':''}" onclick="navTo('overview')">
          <span class="sb-item-icon">◈</span> Обзор
        </button>
        <button class="sb-item ${TS.page==='charts'?'active':''}" onclick="navTo('charts')">
          <span class="sb-item-icon">◉</span> Диаграммы
        </button>
        <button class="sb-item ${TS.page==='journal'?'active':''}" onclick="navTo('journal')">
          <span class="sb-item-icon">≡</span> Журнал
        </button>
        <button class="sb-item ${TS.page==='suspicious'?'active':''}" onclick="navTo('suspicious')">
          <span class="sb-item-icon">⚠</span> Подозрительные
          ${APP.currentData.filter(r=>r.risk_score>=40).length>0?`<span class="sb-badge">${APP.currentData.filter(r=>r.risk_score>=40).length}</span>`:''}
        </button>
        <button class="sb-item ${TS.page==='groups'?'active':''}" onclick="navTo('groups')">
          <span class="sb-item-icon">◫</span> Группы
        </button>
        ${APP.compareResult?`<button class="sb-item ${TS.page==='compare'?'active':''}" onclick="navTo('compare')"><span class="sb-item-icon">⟷</span> Сравнение</button>`:''}
        <button class="sb-item ${TS.page==='ai'?'active':''}" onclick="navTo('ai')">
          <span class="sb-item-icon">✦</span> AI Ассистент
        </button>` : ''}
        <button class="sb-item ${TS.page==='constructor'?'active':''}" onclick="navTo('constructor')">
          <span class="sb-item-icon">⚙</span> Конструктор
        </button>
        ${can_manage() ? `
        <div class="sb-section" style="margin-top:6px">Управление</div>
        <button class="sb-item ${TS.page==='team'?'active':''}" onclick="navTo('team')">
          <span class="sb-item-icon">◫</span> Команда
        </button>` : ''}
        ${is_admin() ? `
        <button class="sb-item ${TS.page==='pending'?'active':''}" onclick="navTo('pending')">
          <span class="sb-item-icon">⚑</span> Заявки
          ${pending>0?`<span class="sb-badge">${pending}</span>`:''}
        </button>` : ''}
      </div>
      <div class="sb-user">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div class="sb-avatar">${initials(TS.profile.full_name)}</div>
          <div>
            <div class="sb-user-name">${esc(TS.profile.full_name.split(' ').slice(0,2).join(' '))}</div>
            <div class="sb-user-role">${ROLES[TS.profile.role]||TS.profile.role}</div>
          </div>
        </div>
        ${APP.currentData?`<button class="btn-sec" style="width:100%;margin-bottom:5px;font-size:11px" onclick="exportToExcel()">📥 Экспорт Excel</button>`:''}
        <button class="sb-logout" onclick="logout()">Выйти</button>
      </div>
    </div>
    <div class="main">
      ${isEngine ? renderEngineWrap() : renderTeamPage()}
    </div>
  </div>
  ${TS.modal ? renderModal() : ''}`;

  if (TS.page==='charts') { drawCharts(); }
  if (TS.page==='ai') { setupAIChat(); }
}

function renderEngineWrap() {
  return `<div class="eng-wrap">
    <div class="topbar">
      <div class="topbar-title">
        ${TS.page==='upload'?'Загрузка файлов 1С':
          TS.page==='overview'?'Обзор рисков':
          TS.page==='charts'?'Диаграммы':
          TS.page==='journal'?'Журнал операций':
          TS.page==='suspicious'?'Подозрительные операции':
          TS.page==='groups'?'Группы счетов':
          TS.page==='compare'?'Сравнение периодов':
          TS.page==='constructor'?'Конструктор проверок':
          TS.page==='ai'?'AI Ассистент':''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${APP.currentName?`<span class="header-tag tag-file">📄 ${esc(APP.currentName)}</span>`:''}
        ${APP.currentData?`<span class="header-tag tag-count">${APP.currentData.length} записей</span>`:''}
      </div>
    </div>
    <div class="eng-content fade-in" id="engineContent">
      ${renderEnginePage()}
    </div>
  </div>`;
}

function renderEnginePage() {
  switch(TS.page) {
    case 'upload': return renderUpload();
    case 'overview': return renderOverview();
    case 'charts': return renderCharts();
    case 'journal': return renderTable(APP.currentData, true);
    case 'suspicious': return renderTable(APP.currentData.filter(r=>r.risk_score>=40).sort((a,b)=>b.risk_score-a.risk_score), false);
    case 'groups': return renderGroups();
    case 'compare': return renderCompare();
    case 'constructor': return renderConstructor();
    case 'ai': return renderAI();
    default: return '';
  }
}

function renderTeamPage() {
  const pending = TS.profiles.filter(p=>p.status==='pending').length;
  const myTasks = TS.tasks.filter(t=>t.assigned_to===TS.profile.id && t.status!=='completed');
  const title = {dashboard:'Дашборд',tasks:'Задачи',mytasks:'Мои задачи',team:'Команда',pending:'Заявки на вступление'}[TS.page]||'';
  return `<div style="display:flex;flex-direction:column;flex:1">
    <div class="topbar">
      <div class="topbar-title">${title}</div>
      <div>
        ${can_manage() && TS.page==='tasks'?`<button class="btn-add" onclick="openCreateTask()">+ Создать задачу</button>`:''}
      </div>
    </div>
    <div class="page-content fade-in">
      ${TS.loading ? '<div style="text-align:center;padding:60px;color:var(--text3)"><div class="spinner" style="margin:0 auto 10px"></div>Загрузка...</div>' : renderTeamContent()}
    </div>
  </div>`;
}

function renderTeamContent() {
  if (TS.page==='dashboard') return renderDashboard();
  if (TS.page==='tasks') return renderTasks(TS.tasks);
  if (TS.page==='mytasks') return renderTasks(TS.tasks.filter(t=>t.assigned_to===TS.profile.id));
  if (TS.page==='team') return renderTeam();
  if (TS.page==='pending') return renderPending();
  return '';
}

function navTo(page) {
  if (TS.page==='charts') destroyCharts();
  TS.page = page;
  APP.page = 0; APP.filter = 'ALL'; APP.search = '';
  // Sync engine render functions
  if (page==='upload') { setTimeout(()=>setupDragDrop(),50); }
  renderApp();
}

// Engine render() redirects to renderApp()
function render() { renderApp(); }

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
try {
  const savedKey = localStorage.getItem("optro_groq_key");
  if (savedKey && savedKey.startsWith("gsk_")) APP.apiKey = savedKey;
} catch(e) {}

async function init() {
  document.getElementById('app').innerHTML = '<div class="loading-screen"><div class="spinner"></div> Загрузка OPTRO...</div>';
  const {data:{session}} = await sb.auth.getSession();
  if (session) {
    TS.user = session.user;
    await loadProfile(session.user.id);
    if (TS.profile?.status==='active') {
      await loadData();
    } else {
      TS.user = null; TS.profile = null;
    }
  }
  renderApp();
}

init();
</script>
</body>
</html>
