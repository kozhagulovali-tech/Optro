<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPTRO — Risk Engine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ══════════════════════════════════════════
   TEAM SYSTEM STYLES
══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0f18;--bg2:#0e1219;--bg3:#111724;--bg4:#161b26;
  --border:#1e2536;--border2:#252d3d;
  --text:#d0d8e4;--text2:#8e9baf;--text3:#5a6577;
  --blue:#3d7af5;--cyan:#5bc0fa;--green:#3ddc84;
  --red:#ff3b5c;--orange:#ff9f1a;--purple:#7c3aed;
}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a4a66}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-content{padding:24px 28px;flex:1}

/* Sidebar */
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(--cyan),var(--blue));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;flex-shrink:0}
.sb-logo-text{font-size:15px;font-weight:700;color:#e8ecf2}
.sb-logo-sub{font-size:10px;color:var(--text3)}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.sb-section{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:8px 8px 4px;font-weight:600}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;color:var(--text2);font-size:12px;cursor:pointer;transition:.15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.sb-item:hover{background:var(--bg4);color:var(--text)}
.sb-item.active{background:#3d7af522;color:var(--cyan);font-weight:600}
.sb-item-icon{width:15px;text-align:center;flex-shrink:0;opacity:.7;font-size:11px}
.sb-badge{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:8px;background:var(--red);color:#fff;font-weight:700}
.sb-user{padding:12px;border-top:1px solid var(--border)}
.sb-avatar{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--purple),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sb-user-name{font-size:12px;font-weight:600;color:var(--text)}
.sb-user-role{font-size:10px;color:var(--text3)}
.sb-logout{margin-top:7px;width:100%;padding:5px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit;transition:.15s}
.sb-logout:hover{border-color:var(--red);color:var(--red)}

/* Auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-card{background:var(--bg4);border:1px solid var(--border2);border-radius:16px;padding:32px 36px;width:100%;max-width:460px}
.auth-tabs{display:flex;gap:0;margin-bottom:22px;background:var(--bg2);border-radius:8px;padding:3px}
.auth-tab{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-radius:6px;border:none;background:none;font-family:inherit;transition:.15s}
.auth-tab.active{background:var(--bg4);color:var(--text);font-weight:600}
.form-group{margin-bottom:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;display:block}
.form-input{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:.2s}
.form-input:focus{border-color:var(--blue)}
.form-select{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;outline:none;appearance:none}
.btn-primary-auth{width:100%;padding:11px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:6px}
.btn-primary-auth:hover{box-shadow:0 0 20px #5bc0fa33;transform:translateY(-1px)}
.auth-msg{padding:10px 14px;border-radius:7px;font-size:13px;margin-top:10px;text-align:center}
.auth-msg.success{background:#3ddc8422;border:1px solid #3ddc8444;color:var(--green)}
.auth-msg.error{background:#ff3b5c22;border:1px solid #ff3b5c44;color:var(--red)}
.auth-msg.info{background:#5bc0fa22;border:1px solid #5bc0fa44;color:var(--cyan)}

/* Cards & Panels */
.stat-cards{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.stat-card{background:var(--bg4);border:1px solid var(--border2);border-radius:10px;padding:16px 18px;flex:1 1 150px;min-width:140px;position:relative;overflow:hidden}
.stat-card .accent{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:10px 0 0 10px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.stat-value{font-size:24px;font-weight:800}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}
.panel{background:var(--bg4);border:1px solid var(--border2);border-radius:10px;padding:18px 20px;margin-bottom:18px}
.panel-title{font-size:13px;font-weight:700;color:#e8ecf2;margin-bottom:12px}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}

/* Table */
.table-wrap{background:var(--bg3);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.table-scroll{overflow-x:auto;max-height:460px;overflow-y:auto}
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);background:var(--bg3);position:sticky;top:0;z-index:2;font-weight:600;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text2)}
td{padding:9px 12px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#161d2b}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.badge-pending{background:#ff9f1a22;color:var(--orange);border:1px solid #ff9f1a44}
.badge-active{background:#3ddc8422;color:var(--green);border:1px solid #3ddc8444}
.badge-blocked{background:#ff3b5c22;color:var(--red);border:1px solid #ff3b5c44}
.badge-in_progress{background:#3d7af522;color:var(--blue);border:1px solid #3d7af544}
.badge-review{background:#7c3aed22;color:#a78bfa;border:1px solid #7c3aed44}
.badge-completed{background:#3ddc8422;color:var(--green);border:1px solid #3ddc8444}
.badge-high{background:#ff3b5c22;color:var(--red);border:1px solid #ff3b5c44}
.badge-medium{background:#ff9f1a22;color:var(--orange);border:1px solid #ff9f1a44}
.badge-low{background:#5bc0fa22;color:var(--cyan);border:1px solid #5bc0fa44}
.badge-urgent{background:#ff3b5c44;color:var(--red);border:1px solid var(--red)}
.role-admin{background:#7c3aed22;color:#a78bfa;border:1px solid #7c3aed44}
.role-senior_auditor{background:#3d7af522;color:var(--cyan);border:1px solid #3d7af544}
.role-auditor{background:#252d3d;color:var(--text2);border:1px solid var(--border2)}

/* Buttons */
.btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-danger{border-color:#ff3b5c44;color:var(--red)}
.btn-danger:hover{background:#ff3b5c22;border-color:var(--red)}
.btn-success{border-color:#3ddc8444;color:var(--green)}
.btn-success:hover{background:#3ddc8422;border-color:var(--green)}
.btn-add{padding:7px 14px;border-radius:7px;border:none;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.btn-add:hover{box-shadow:0 0 14px #5bc0fa33}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;animation:fadeIn .2s}
.modal{background:var(--bg4);border:1px solid var(--border2);border-radius:14px;padding:26px 30px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:#e8ecf2;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:4px}
.modal-close:hover{color:var(--red)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}

/* Task */
.task-list{display:flex;flex-direction:column;gap:8px}
.task-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:14px 16px;cursor:pointer;transition:.2s}
.task-card:hover{border-color:var(--border2);background:var(--bg4)}
.task-card.priority-urgent{border-left:3px solid var(--red)}
.task-card.priority-high{border-left:3px solid var(--orange)}
.task-card.priority-medium{border-left:3px solid var(--blue)}
.task-card.priority-low{border-left:3px solid var(--text3)}
.task-title{font-size:13px;font-weight:600;color:#e8ecf2;margin-bottom:5px}
.task-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--text3)}
.task-deadline.overdue{color:var(--red)}

/* Comment */
.comment{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.comment:last-child{border-bottom:none}
.comment-author{font-size:12px;font-weight:600;color:var(--text)}
.comment-time{font-size:11px;color:var(--text3)}
.comment-text{font-size:13px;color:var(--text2);line-height:1.5;margin-top:3px}

/* Misc */
.page-title{font-size:18px;font-weight:800;color:#e8ecf2;margin-bottom:4px}
.page-sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.4}
.divider{height:1px;background:var(--border);margin:14px 0}
.topbar-title{font-size:14px;font-weight:700;color:#e8ecf2}
.pending-alert{background:#ff9f1a18;border:1px solid #ff9f1a33;border-radius:8px;padding:9px 14px;font-size:13px;color:var(--orange);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.textarea{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:70px}
.textarea:focus{border-color:var(--blue)}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--text3);font-size:14px;gap:10px}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ══════════════════════════════════════════
   RISK ENGINE STYLES
══════════════════════════════════════════ */
.eng-header{background:linear-gradient(135deg,#0d1220,#131a2e);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.eng-tabs{display:flex;gap:2px;padding:0 20px;background:#0d1220;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.tab-btn{padding:10px 16px;background:transparent;border:none;border-bottom:2px solid transparent;color:#5a6577;font-size:12px;font-weight:400;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.tab-btn.active{background:#131a2e;border-bottom-color:#5bc0fa;color:#e8ecf2;font-weight:600}
.tab-btn:hover:not(.active){color:#8e9baf}
.tab-badge{margin-left:6px;font-size:10px;padding:1px 6px;border-radius:10px;background:#ff3b5c22;color:#ff3b5c;font-weight:700}
.eng-content{padding:20px;flex:1;overflow-y:auto}
.eng-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
.header-tag{padding:5px 12px;border-radius:6px;font-size:11px;font-family:'JetBrains Mono',monospace}
.tag-file{background:#141c2d;border:1px solid #222d42;color:#7a8da6}
.tag-count{background:#3d7af522;border:1px solid #3d7af544;color:#5bc0fa;font-weight:600;font-family:'DM Sans',sans-serif}
.cards{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.risk-bar{display:flex;border-radius:6px;overflow:hidden;height:8px;background:#0e1219}
.risk-legend{display:flex;gap:20px;margin-top:10px;flex-wrap:wrap}
.risk-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7a90}
.risk-dot{width:7px;height:7px;border-radius:2px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-label{width:120px;font-size:11px;color:#8e9baf;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:#0e1219;border-radius:3px;height:5px}
.bar-fill{height:5px;border-radius:3px;transition:width .5s}
.bar-count{font-size:11px;color:#6b7a90;width:28px;text-align:right}
.controls{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.search-input{padding:7px 12px;border-radius:6px;border:1px solid #252d3d;background:#111724;color:#c4cedb;font-size:12px;width:260px;outline:none;font-family:inherit}
.search-input:focus{border-color:#3d7af5}
.filter-btn{padding:5px 10px;border-radius:5px;border:1px solid #252d3d;background:#111724;color:#6b7a90;font-size:11px;cursor:pointer;font-family:inherit;font-weight:400;transition:all .15s}
.filter-btn.active{font-weight:600}
.results-count{margin-left:auto;font-size:11px;color:#5a6577}
.risk-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px}
.flag-pill{display:inline-block;font-size:9px;padding:1px 5px;background:#1e2536;border:1px solid #2a3349;border-radius:3px;color:#8e9baf;white-space:nowrap;margin:1px}
.pagination{display:flex;justify-content:center;gap:6px;margin-top:14px}
.page-btn{padding:5px 12px;border-radius:5px;border:1px solid #252d3d;background:#111724;color:#8e9baf;cursor:pointer;font-family:inherit;font-size:12px}
.page-btn:disabled{color:#2a3349;cursor:default}
.page-info{padding:5px 12px;font-size:12px;color:#6b7a90}
.upload-zone{border:2px dashed #252d3d;border-radius:10px;padding:36px 24px;text-align:center;transition:all .3s;cursor:pointer;margin-bottom:12px;position:relative}
.upload-zone:hover,.upload-zone.drag-over{border-color:#5bc0fa;background:#5bc0fa08}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.upload-box{background:#111724;border:1px solid #1e2536;border-radius:9px;padding:16px;position:relative}
.upload-box-label{font-size:12px;font-weight:600;color:#8e9baf;margin-bottom:10px}
.file-loaded{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#161b26;border-radius:7px;border:1px solid #252d3d;margin-top:6px}
.file-loaded-name{font-size:12px;color:#c4cedb;flex:1}
.file-loaded-size{font-size:10px;color:#5a6577}
.file-loaded-remove{background:none;border:none;color:#ff3b5c;cursor:pointer;font-size:14px;padding:2px 5px}
.btn-eng{padding:10px 22px;border-radius:7px;border:none;background:linear-gradient(135deg,#3d7af5,#5bc0fa);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-eng:hover{box-shadow:0 0 20px #5bc0fa44;transform:translateY(-1px)}
.btn-eng:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}
.btn-sec{padding:7px 16px;border-radius:6px;border:1px solid #252d3d;background:#111724;color:#8e9baf;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-sec:hover{border-color:#5bc0fa;color:#5bc0fa}
.progress-bar{height:3px;background:#0e1219;border-radius:2px;overflow:hidden;margin:14px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#3d7af5,#5bc0fa);border-radius:2px;transition:width .3s}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.text-right{text-align:right}
.change-up{color:#3ddc84}.change-down{color:#ff3b5c}.change-same{color:#5a6577}
.compare-card{background:#161b26;border:1px solid #252d3d;border-radius:9px;padding:16px 20px;flex:1 1 140px;min-width:140px}
.compare-label{font-size:10px;color:#7a8599;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
.compare-values{display:flex;align-items:baseline;gap:8px}
.compare-old{font-size:14px;color:#5a6577;text-decoration:line-through}
.compare-new{font-size:20px;font-weight:700}
.compare-delta{font-size:12px;font-weight:600;margin-left:auto}
.desc-text{font-size:12px;color:#6b7a90;margin-bottom:14px}
/* Constructor */
.ctor-section{background:#161b26;border:1px solid #252d3d;border-radius:9px;padding:16px 20px;margin-bottom:16px}
.ctor-title{font-size:12px;font-weight:700;color:#5bc0fa;margin-bottom:12px}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a2133}
.check-row:last-child{border-bottom:none}
.check-toggle{position:relative;width:34px;height:18px;flex-shrink:0}
.check-toggle input{opacity:0;width:0;height:0;position:absolute}
.check-slider{position:absolute;inset:0;background:#1e2536;border-radius:9px;cursor:pointer;transition:.2s}
.check-slider:before{content:"";position:absolute;width:12px;height:12px;left:3px;top:3px;background:#5a6577;border-radius:50%;transition:.2s}
.check-toggle input:checked + .check-slider{background:#3d7af522;border:1px solid #3d7af5}
.check-toggle input:checked + .check-slider:before{transform:translateX(16px);background:#5bc0fa}
.check-label{flex:1;font-size:12px;color:#c4cedb}
.check-score-input{width:52px;padding:3px 7px;border-radius:5px;border:1px solid #252d3d;background:#0e1219;color:#5bc0fa;font-size:12px;font-family:'JetBrains Mono',monospace;text-align:center;outline:none}
.score-label{font-size:10px;color:#4e5a6e;white-space:nowrap}
.ctor-add-form{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;padding:12px;background:#0e1219;border-radius:7px;border:1px solid #1a2133;margin-top:10px}
.ctor-input{padding:6px 10px;border-radius:6px;border:1px solid #252d3d;background:#111724;color:#c4cedb;font-size:12px;font-family:inherit;outline:none;flex:1;min-width:100px}

<script>

const ROLES = {admin:'Администратор', senior_auditor:'Старший аудитор', auditor:'Аудитор'};

const DEPTS = ['Внутренний аудит','Финансы','Бухгалтерия','IT','Юридический','Операционный'];

// ═══════════════════════════════════════════════════════
// TEAM STATE

let TS = {
// Alias for team functions compatibility
const STATE = TS;
  user:null, profile:null, page:'dashboard',
  profiles:[], tasks:[], loading:false,
  modal:null, selectedTask:null, comments:[]
};

// ═══════════════════════════════════════════════════════
// RISK ENGINE CONSTANTS
// ═══════════════════════════════════════════════════════
const RC = {HIGH:"#ff3b5c",MEDIUM:"#ff9f1a",LOW:"#5bc0fa",NORMAL:"#3ddc84"};
const FL = {
  manual_or_adjustment_keyword:"Ручная корр.",period_end_posting:"Конец периода",
  weekend_posting:"Выходной",large_amount:"Крупная сумма",round_amount:"Круглая сумма",
  rare_account_pair:"Редкая пара",unmapped_account:"Нет маппинга",
  unexpected_account_side:"Необычная сторона",missing_document:"Нет документа",
  one_sided_analytics:"Односторонняя аналитика",duplicate_like_entry:"Дубликат",
  new_counterparty_vs_history:"Новый контрагент",extreme_amount:"Экстремальная сумма"
};
const SCORE_MAP = {
  manual_or_adjustment_keyword:30,period_end_posting:15,weekend_posting:10,
  large_amount:25,round_amount:10,rare_account_pair:20,unmapped_account:20,
  unexpected_account_side:25,missing_document:15,one_sided_analytics:10,
  duplicate_like_entry:20,new_counterparty_vs_history:15,extreme_amount:35
};
const SUSPICIOUS_KW = ["ручная","корректировка","исправление","операция вручную","сторно","перенос","закрытие периода","adjustment","manual","correction","reclass"];
const DEFAULT_MAPPING = {
  "1010":"Cash","1030":"Bank","1210":"Accounts Receivable","1250":"Employee Receivables",
  "1310":"Raw Materials","1330":"Goods","2410":"Fixed Assets","2420":"Depreciation",
  "2930":"Other Assets","3310":"Accounts Payable","3350":"Payroll Payable",
  "3390":"Other Payables","6010":"Revenue","6020":"Other Revenue","7010":"COGS",
  "7110":"Selling Expenses","7210":"Administrative Expenses","7310":"Finance Expenses",
  "7410":"Other Expenses","7510":"Tax Expenses"
};
const EXPENSE_GROUPS = ["Administrative Expenses","Selling Expenses","Finance Expenses","Other Expenses","Tax Expenses","COGS"];
const PER_PAGE = 25;

// ═══════════════════════════════════════════════════════
// RISK ENGINE STATE
// ═══════════════════════════════════════════════════════
let APP = {
  tab:"upload", filter:"ALL", search:"", sortField:"risk_score", sortDir:"desc", page:0,
  currentData:null, prevData:null, currentFile:null, prevFile:null,
  currentName:"", prevName:"", mapping:{...DEFAULT_MAPPING}, compareResult:null,
  aiMessages:[], aiLoading:false, apiKey:"",
  checks: Object.keys(SCORE_MAP).map(key=>({id:key,enabled:true,score:SCORE_MAP[key],label:FL[key]||key,type:"builtin"})),
  customChecks:[]
};

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = n => n>=1e9?(n/1e9).toFixed(1)+" млрд":n>=1e6?(n/1e6).toFixed(1)+" млн":n>=1e3?(n/1e3).toFixed(0)+" тыс":String(Math.round(n));
const fmtFull = n => Math.round(n).toLocaleString("ru-RU");
const pct = (a,b) => b>0?((a-b)/b*100).toFixed(1):a>0?"+100":"0";
const deltaClass = v => v>5?"change-up":v<-5?"change-down":"change-same";
const fmt_date = d => d ? new Date(d).toLocaleDateString('ru-RU') : '—';
const fmt_datetime = d => d ? new Date(d).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
const initials = name => name ? name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '??';
const is_overdue = d => d && new Date(d) < new Date();
const can_manage = () => TS.profile && ['admin','senior_auditor'].includes(TS.profile.role);
const is_admin = () => TS.profile?.role === 'admin';

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;top:18px;right:22px;z-index:999;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;animation:fadeIn .3s;
    background:${type==='error'?'#ff3b5c22':type==='info'?'#5bc0fa22':'#3ddc8422'};
    border:1px solid ${type==='error'?'#ff3b5c44':type==='info'?'#5bc0fa44':'#3ddc8444'};
    color:${type==='error'?'#ff3b5c':type==='info'?'#5bc0fa':'#3ddc84'}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

function badgeHTML(level) {
  return `<span class="risk-badge" style="background:${RC[level]}22;color:${RC[level]};border:1px solid ${RC[level]}44">${level}</span>`;
}
function flagsHTML(flags) {
  if (!flags) return '<span style="color:#3a4255">—</span>';
  return flags.split(" | ").filter(Boolean).map(f=>`<span class="flag-pill">${esc(FL[f]||f)}</span>`).join("");
}
function sortIcon(field) {
  if (APP.sortField!==field) return '<span style="opacity:.2;margin-left:3px">↕</span>';
  return `<span style="margin-left:3px;color:#5bc0fa">${APP.sortDir==="asc"?"↑":"↓"}</span>`;
}
function normalizeAccount(v) {
  if (v==null||v==="") return "";
  let t = String(v).trim();
  if (t.endsWith(".0")) t = t.slice(0,-2);
  return t;
}
function normalizeText(v) { return v==null?"":String(v).trim().toLowerCase(); }

function parseExcel(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, {type:"array", cellDates:true});
  let sheetName = wb.SheetNames.find(s => s.toLowerCase()==="general");
  if (!sheetName) sheetName = wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const json = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});

  // find header row
  let headerIdx = 0;
  for (let i = 0; i < Math.min(json.length, 10); i++) {
    const row = json[i].map(c => String(c).trim().toLowerCase());
    if (row.some(c => c.includes("период") || c.includes("дата"))) { headerIdx = i; break; }
  }

  const dataRows = json.slice(headerIdx + 1).filter(r => r.some(c => c !== ""));
  if (dataRows.length === 0) throw new Error("Нет данных в файле");

  const colCount = json[headerIdx].length;
  const results = [];

  for (const row of dataRows) {
    // adapt to 8 columns by taking the right ones
    let period, doc, anDt, anKt, accDt, debit, accKt, credit;
    if (colCount >= 8) {
      [period, doc, anDt, anKt, accDt, debit, accKt, credit] = row;
    } else {
      continue;
    }

    const dt = period instanceof Date ? period : new Date(period);
    const validDate = !isNaN(dt.getTime());
    const sumDebit = parseFloat(debit) || 0;
    const sumCredit = parseFloat(credit) || 0;
    const amount = Math.max(sumDebit, sumCredit);
    const sDt = normalizeAccount(accDt);
    const sKt = normalizeAccount(accKt);
    const docNorm = normalizeText(doc);
    const anDtNorm = normalizeText(anDt);
    const anKtNorm = normalizeText(anKt);
    const counterparty = anKtNorm.trim() !== "" ? anKtNorm : anDtNorm;
    const pair = `${sDt} → ${sKt}`;
    const dayOfWeek = validDate ? dt.getDay() : -1;
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const dayOfMonth = validDate ? dt.getDate() : 0;
    const isEndOfMonth = dayOfMonth >= 28;

    results.push({
      period: validDate ? dt.toISOString().slice(0,10) : String(period),
      periodDate: validDate ? dt : null,
      document: docNorm,
      analytics_dt: anDtNorm,
      analytics_kt: anKtNorm,
      account_dt: sDt,
      account_kt: sKt,
      debit: sumDebit,
      credit: sumCredit,
      amount, counterparty, pair,
      isWeekend, isEndOfMonth,
      group_dt: "", group_kt: "",
      risk_score: 0, risk_level: "NORMAL", risk_flags: ""
    });
  }
  return results;
}

function applyMapping(data, mapping) {
  for (const r of data) {
    // Try exact match first, then prefix match (e.g. 1210 matches 1210, 12101, etc.)
    r.group_dt = mapping[r.account_dt] || findPrefixMatch(r.account_dt, mapping) || "";
    r.group_kt = mapping[r.account_kt] || findPrefixMatch(r.account_kt, mapping) || "";
  }
  return data;
}

function findPrefixMatch(acc, mapping) {
  if (!acc) return "";
  const keys = Object.keys(mapping).sort((a,b) => b.length - a.length);
  for (const k of keys) {
    if (acc.startsWith(k)) return mapping[k];
  }
  return "";
}

function addFlag(row, score, flag) {
  row.risk_score += score;
  row.risk_flags = row.risk_flags ? row.risk_flags + " | " + flag : flag;
}

function getCheckScore(id) {
  const c = APP.checks.find(c => c.id === id);
  return (c && c.enabled) ? c.score : 0;
}

function calculateRisk(data, historyData) {
  const pairFreq = {};
  const total = data.length;
  data.forEach(r => { pairFreq[r.pair] = (pairFreq[r.pair]||0) + 1; });

  const amounts = data.map(r => r.amount).filter(a => a > 0).sort((a,b) => a-b);
  const p95 = amounts[Math.floor(amounts.length * 0.95)] || 0;
  const p99 = amounts[Math.floor(amounts.length * 0.99)] || 0;

  const historyCPs = new Set();
  if (historyData && historyData.length > 0) {
    historyData.forEach(r => { if (r.counterparty && r.counterparty.trim()) historyCPs.add(r.counterparty.trim().toLowerCase()); });
  }

  const dupKeys = {};
  data.forEach((r,i) => {
    const key = `${r.period}|${r.document}|${r.account_dt}|${r.account_kt}|${r.amount}`;
    if (!dupKeys[key]) dupKeys[key] = [];
    dupKeys[key].push(i);
  });
  const dupIndices = new Set();
  Object.values(dupKeys).forEach(arr => { if (arr.length > 1) arr.forEach(i => dupIndices.add(i)); });

  data.forEach((r, idx) => {
    r.risk_score = 0;
    r.risk_flags = "";

    const allText = r.document + " " + r.analytics_dt + " " + r.analytics_kt;

    // 1. Keywords
    let s = getCheckScore("manual_or_adjustment_keyword");
    if (s && SUSPICIOUS_KW.some(kw => allText.includes(kw))) addFlag(r, s, "manual_or_adjustment_keyword");
    // 2. End of month
    s = getCheckScore("period_end_posting");
    if (s && r.isEndOfMonth) addFlag(r, s, "period_end_posting");
    // 3. Weekend
    s = getCheckScore("weekend_posting");
    if (s && r.isWeekend) addFlag(r, s, "weekend_posting");
    // 4. Large amount
    s = getCheckScore("large_amount");
    if (s && r.amount > p95 && p95 > 0) addFlag(r, s, "large_amount");
    // 5. Round amount
    s = getCheckScore("round_amount");
    if (s && r.amount > 0 && (r.amount % 1000000 === 0 || r.amount % 100000 === 0)) addFlag(r, s, "round_amount");
    // 6. Rare pair
    s = getCheckScore("rare_account_pair");
    if (s && total > 0 && (pairFreq[r.pair] || 0) / total < 0.01) addFlag(r, s, "rare_account_pair");
    // 7. Unmapped
    s = getCheckScore("unmapped_account");
    if (s && (!r.group_dt || !r.group_kt)) addFlag(r, s, "unmapped_account");
    // 8. Wrong side
    s = getCheckScore("unexpected_account_side");
    if (s && (r.group_dt === "Revenue" || EXPENSE_GROUPS.includes(r.group_kt))) addFlag(r, s, "unexpected_account_side");
    // 9. Missing doc
    s = getCheckScore("missing_document");
    if (s && !r.document.trim()) addFlag(r, s, "missing_document");
    // 10. One-sided analytics
    s = getCheckScore("one_sided_analytics");
    const hasDt = r.analytics_dt.trim() !== "";
    const hasKt = r.analytics_kt.trim() !== "";
    if (s && ((hasDt && !hasKt) || (!hasDt && hasKt))) addFlag(r, s, "one_sided_analytics");
    // 11. Duplicates
    s = getCheckScore("duplicate_like_entry");
    if (s && dupIndices.has(idx)) addFlag(r, s, "duplicate_like_entry");
    // 12. New counterparty
    s = getCheckScore("new_counterparty_vs_history");
    if (s && historyCPs.size > 0 && r.counterparty.trim() && !historyCPs.has(r.counterparty.trim().toLowerCase())) {
      addFlag(r, s, "new_counterparty_vs_history");
    }
    // 13. Extreme amount
    s = getCheckScore("extreme_amount");
    if (s && r.amount > p99 && p99 > 0) addFlag(r, s, "extreme_amount");

    // Custom checks
    for (const cc of APP.customChecks) {
      if (!cc.enabled) continue;
      if (cc.type === "keyword" && cc.keywords && cc.keywords.length > 0) {
        if (cc.keywords.some(kw => kw && allText.toLowerCase().includes(kw.toLowerCase()))) {
          addFlag(r, cc.score, "custom_" + cc.id);
        }
      } else if (cc.type === "range") {
        const minOk = (cc.minAmt === "" || cc.minAmt === null || r.amount >= Number(cc.minAmt));
        const maxOk = (cc.maxAmt === "" || cc.maxAmt === null || r.amount <= Number(cc.maxAmt));
        if (minOk && maxOk && r.amount > 0) addFlag(r, cc.score, "custom_" + cc.id);
      }
    }

    r.risk_level = r.risk_score >= 70 ? "HIGH" : r.risk_score >= 40 ? "MEDIUM" : r.risk_score >= 20 ? "LOW" : "NORMAL";
  });

  return data;
}

// ═══════════════════════════════════════════════════════════
// COMPARISON ENGINE
// ═══════════════════════════════════════════════════════════
function compareData(currentData, prevData) {
  const curCounts = {HIGH:0,MEDIUM:0,LOW:0,NORMAL:0};
  const prevCounts = {HIGH:0,MEDIUM:0,LOW:0,NORMAL:0};
  let curTotal=0, prevTotal=0, curSusp=0, prevSusp=0;

  currentData.forEach(r => { curCounts[r.risk_level]++; curTotal+=r.amount; if(r.risk_score>=40) curSusp+=r.amount; });
  prevData.forEach(r => { prevCounts[r.risk_level]++; prevTotal+=r.amount; if(r.risk_score>=40) prevSusp+=r.amount; });

  // Account group totals
  const curGroups = {}, prevGroups = {};
  currentData.forEach(r => {
    const key = r.group_dt || r.account_dt;
    if (!curGroups[key]) curGroups[key] = {debit:0,credit:0,count:0,riskSum:0};
    curGroups[key].debit += r.debit;
    curGroups[key].credit += r.credit;
    curGroups[key].count++;
    curGroups[key].riskSum += r.risk_score;
  });
  prevData.forEach(r => {
    const key = r.group_dt || r.account_dt;
    if (!prevGroups[key]) prevGroups[key] = {debit:0,credit:0,count:0,riskSum:0};
    prevGroups[key].debit += r.debit;
    prevGroups[key].credit += r.credit;
    prevGroups[key].count++;
    prevGroups[key].riskSum += r.risk_score;
  });

  const allGroupKeys = [...new Set([...Object.keys(curGroups),...Object.keys(prevGroups)])];
  const groupChanges = allGroupKeys.map(k => {
    const cur = curGroups[k] || {debit:0,credit:0,count:0,riskSum:0};
    const prev = prevGroups[k] || {debit:0,credit:0,count:0,riskSum:0};
    const curAmt = cur.debit + cur.credit;
    const prevAmt = prev.debit + prev.credit;
    const delta = curAmt - prevAmt;
    const pct = prevAmt > 0 ? ((curAmt - prevAmt)/prevAmt*100) : (curAmt > 0 ? 100 : 0);
    return {group:k, curAmt, prevAmt, delta, pct, curCount:cur.count, prevCount:prev.count,
      curAvgRisk: cur.count>0?cur.riskSum/cur.count:0, prevAvgRisk: prev.count>0?prev.riskSum/prev.count:0,
      isNew: !prevGroups[k], isRemoved: !curGroups[k]
    };
  }).sort((a,b) => Math.abs(b.pct) - Math.abs(a.pct));

  // New counterparties
  const prevCPs = new Set(prevData.map(r => r.counterparty).filter(Boolean));
  const newCPs = [...new Set(currentData.map(r=>r.counterparty).filter(c => c && !prevCPs.has(c)))];

  // New account pairs
  const prevPairs = new Set(prevData.map(r=>r.pair));
  const newPairs = [...new Set(currentData.map(r=>r.pair).filter(p => !prevPairs.has(p)))];

  return {
    curCounts, prevCounts, curTotal, prevTotal, curSusp, prevSusp,
    curLen: currentData.length, prevLen: prevData.length,
    groupChanges, newCPs, newPairs
  };
}

// ═══════════════════════════════════════════════════════════
// PROCESS
// ═══════════════════════════════════════════════════════════
function processFile(buffer, historyData) {
  let data = parseExcel(buffer);
  data = applyMapping(data, APP.mapping);
  data = calculateRisk(data, historyData);
  return data;
}

const fmt = n => n>=1e9?(n/1e9).toFixed(1)+" млрд":n>=1e6?(n/1e6).toFixed(1)+" млн":n>=1e3?(n/1e3).toFixed(0)+" тыс":String(Math.round(n));
const fmtFull = n => Math.round(n).toLocaleString("ru-RU");
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const pct = (a,b) => b>0?((a-b)/b*100).toFixed(1):a>0?"+100":"0";
const deltaArrow = v => v>0?"▲":v<0?"▼":"—";
const deltaClass = v => v>5?"change-up":v<-5?"change-down":"change-same";

function badgeHTML(level) {
  return `<span class="risk-badge" style="background:${RC[level]}22;color:${RC[level]};border:1px solid ${RC[level]}44">${level}</span>`;

function flagsHTML(flags) {

function sortIcon(field) {

  return `<span style="margin-left:4px;color:#5bc0fa">${APP.sortDir==="asc"?"↑":"↓"}</span>`;
}

    <div class="panel">

      <div style="display:flex;gap:24px;flex-wrap:wrap">
        ${["HIGH","MEDIUM","LOW","NORMAL"].map(l => {
          const d = c.curCounts[l] - c.prevCounts[l];
          const dc = d>0?"change-up":d<0?"change-down":"change-same";
          return `<div style="text-align:center">
            <div style="font-size:11px;color:#6b7a90;margin-bottom:4px">${l}</div>
            <div style="font-size:20px;font-weight:700;color:${RC[l]}">${c.prevCounts[l]} → ${c.curCounts[l]}</div>
            <div class="${dc}" style="font-size:12px;font-weight:600">${d>0?"+":""}${d}</div>
          </div>`;
        }).join("")}
      </div>
    </div>
  </div>`;
}

function toggleCheck(id, val) {
  const c = APP.checks.find(c=>c.id===id);
  if (c) c.enabled = val;
}
function setCheckScore(id, val) {
  const c = APP.checks.find(c=>c.id===id);
  if (c) c.score = Math.max(0, Math.min(100, parseInt(val)||0));
}
function toggleCustomCheck(i, val) { APP.customChecks[i].enabled = val; }
function setCustomScore(i, val) { APP.customChecks[i].score = Math.max(0, Math.min(100, parseInt(val)||0)); }
function deleteCustomCheck(i) { APP.customChecks.splice(i,1); render(); }

function addKeywordCheck() {
  const label = document.getElementById("newKwLabel").value.trim();
  const words = document.getElementById("newKwWords").value.trim();
  const score = parseInt(document.getElementById("newKwScore").value)||20;
  if (!label || !words) return alert("Заполните название и ключевые слова");
  APP.customChecks.push({
    id: Date.now().toString(),
    label, type:"keyword",
    keywords: words.split(",").map(w=>w.trim()).filter(Boolean),
    score, enabled:true
  });
  render();
}
function addRangeCheck() {
  const label = document.getElementById("newRangeLabel").value.trim();
  const minAmt = document.getElementById("newRangeMin").value;
  const maxAmt = document.getElementById("newRangeMax").value;
  const score = parseInt(document.getElementById("newRangeScore").value)||15;
  if (!label) return alert("Заполните название проверки");
  APP.customChecks.push({
    id: Date.now().toString(),
    label, type:"range",
    minAmt: minAmt !== "" ? Number(minAmt) : null,
    maxAmt: maxAmt !== "" ? Number(maxAmt) : null,
    score, enabled:true
  });
  render();
}

function applyChecks() {
  if (!APP.currentData) return;
  // Пересчёт с учётом маппинга
  let d = APP.currentData;
  d = calculateRisk(d, APP.prevData || null);
  APP.currentData = d;
  if (APP.prevData) APP.compareResult = compareData(d, APP.prevData);
  TS.page = 'overview';
  renderApp();
  // Уведомление
  const el = document.createElement("div");
  el.style.cssText = "position:fixed;top:20px;right:24px;background:#3ddc8422;border:1px solid #3ddc8444;color:#3ddc84;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;animation:fadeIn .3s";
  el.textContent = "✓ Проверки применены — данные пересчитаны!";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}

function drawCharts() {

  };

  });

  // 2. Bar — топ флагов
  const flagCounts = {};
  data.forEach(r=>{if(r.risk_flags)r.risk_flags.split(" | ").forEach(f=>{if(f)flagCounts[f]=(flagCounts[f]||0)+1})});
  const topFlags = Object.entries(flagCounts).sort((a,b)=>b[1]-a[1]).slice(0,7);
  _charts.flags = new Chart(document.getElementById("chartFlags"), {
    type:"bar",
    data:{
      labels: topFlags.map(([f])=>FL[f]||f),
      datasets:[{data:topFlags.map(([,c])=>c),backgroundColor:"#3d7af588",borderColor:"#5bc0fa",borderWidth:1,borderRadius:4}]
    },

      scales:{x:{...axisStyle},y:{...axisStyle,ticks:{...axisStyle.ticks,font:{size:10}}}}}
  });

  // 3. Line — динамика по датам
  const byDate = {};
  data.forEach(r=>{if(r.period){byDate[r.period]=(byDate[r.period]||0)+1}});
  const sortedDates = Object.keys(byDate).sort();
  const byDateHigh = {};
  data.filter(r=>r.risk_level==="HIGH").forEach(r=>{if(r.period)byDateHigh[r.period]=(byDateHigh[r.period]||0)+1});
  _charts.dynamic = new Chart(document.getElementById("chartDynamic"), {
    type:"line",
    data:{
      labels: sortedDates,
      datasets:[
        {label:"Все операции",data:sortedDates.map(d=>byDate[d]||0),borderColor:"#5bc0fa",backgroundColor:"#5bc0fa18",fill:true,tension:.3,pointRadius:2},
        {label:"HIGH риск",data:sortedDates.map(d=>byDateHigh[d]||0),borderColor:"#ff3b5c",backgroundColor:"#ff3b5c18",fill:true,tension:.3,pointRadius:2}
      ]
    },
    options:{...cfg, scales:{x:{...axisStyle,ticks:{...axisStyle.ticks,maxTicksLimit:10,maxRotation:30}},y:{...axisStyle}}}
  });

  // 4. Bar — топ контрагентов по сумме
  const cpSums = {};
  data.forEach(r=>{if(r.counterparty&&r.counterparty.trim())cpSums[r.counterparty]=(cpSums[r.counterparty]||0)+r.amount});
  const topCPs = Object.entries(cpSums).sort((a,b)=>b[1]-a[1]).slice(0,8);
  _charts.cp = new Chart(document.getElementById("chartCounterparty"), {
    type:"bar",
    data:{
      labels:topCPs.map(([cp])=>cp.length>18?cp.slice(0,18)+"…":cp),
      datasets:[{data:topCPs.map(([,s])=>Math.round(s/1000)),backgroundColor:"#7c3aed88",borderColor:"#a78bfa",borderWidth:1,borderRadius:4}]
    },
    options:{...cfg, plugins:{...cfg.plugins,legend:{display:false},tooltip:{callbacks:{label:ctx=>`${(ctx.raw).toLocaleString("ru-RU")} тыс ₸`}}},
      scales:{x:{...axisStyle,ticks:{...axisStyle.ticks,maxRotation:35,font:{size:10}}},y:{...axisStyle,title:{display:true,text:"тыс ₸",color:"#5a6577"}}}}
  });

  // 5. Bar — распределение по счетам (top дебет)
  const accSums = {};
  data.forEach(r=>{if(r.account_dt)accSums[r.account_dt]=(accSums[r.account_dt]||0)+r.debit});
  const topAcc = Object.entries(accSums).sort((a,b)=>b[1]-a[1]).slice(0,10);
  _charts.acc = new Chart(document.getElementById("chartAccounts"), {
    type:"bar",
    data:{
      labels:topAcc.map(([a])=>a),
      datasets:[{label:"Дебет (тыс ₸)",data:topAcc.map(([,s])=>Math.round(s/1000)),backgroundColor:"#ff9f1a88",borderColor:"#ff9f1a",borderWidth:1,borderRadius:4}]
    },
    options:{...cfg, plugins:{...cfg.plugins,legend:{display:false}},
      scales:{x:{...axisStyle},y:{...axisStyle,title:{display:true,text:"тыс ₸",color:"#5a6577"}}}}
  });
}

function buildAuditContext() {
  const data = APP.currentData;
  if (!data || data.length === 0) return "";

  const counts = {HIGH:0,MEDIUM:0,LOW:0,NORMAL:0};
  let totalAmt = 0, suspAmt = 0;
  data.forEach(r => { counts[r.risk_level]++; totalAmt += r.amount; if (r.risk_score >= 40) suspAmt += r.amount; });

  const flagCounts = {};
  data.forEach(r => { if (r.risk_flags) r.risk_flags.split(" | ").forEach(f => { if (f) flagCounts[f] = (flagCounts[f]||0)+1; }); });
  const topFlags = Object.entries(flagCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const pairFreq = {};
  data.forEach(r => { pairFreq[r.pair] = (pairFreq[r.pair]||0)+1; });
  const topPairs = Object.entries(pairFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const cpRisk = {};
  data.forEach(r => {
    if (r.counterparty) {
      if (!cpRisk[r.counterparty]) cpRisk[r.counterparty] = {score:0, count:0};
      cpRisk[r.counterparty].score += r.risk_score;
      cpRisk[r.counterparty].count++;
    }
  });
  const topRiskyCPs = Object.entries(cpRisk)
    .map(([cp,v])=>({cp, avg: v.score/v.count, count: v.count}))
    .filter(x => x.avg >= 30)
    .sort((a,b)=>b.avg-a.avg).slice(0,5);

  const highRiskSamples = data.filter(r => r.risk_level === "HIGH").slice(0, 5).map(r =>
    `  - ${r.period} | ${r.document||"б/н"} | ${r.pair} | ${Math.round(r.amount).toLocaleString("ru-RU")} ₸ | Флаги: ${r.risk_flags}`
  );

  let ctx = `ДАННЫЕ АУДИТА (OPTRO Risk Engine):
Файл: ${APP.currentName}
Всего операций: ${data.length}
Общая сумма: ${Math.round(totalAmt).toLocaleString("ru-RU")} ₸

РИСК-ПРОФИЛЬ:
- HIGH (≥70 баллов): ${counts.HIGH} операций
- MEDIUM (40-69): ${counts.MEDIUM} операций
- LOW (20-39): ${counts.LOW} операций
- NORMAL (<20): ${counts.NORMAL} операций
- Подозрительных сумм (HIGH+MEDIUM): ${Math.round(suspAmt).toLocaleString("ru-RU")} ₸

ТОП ФЛАГИ РИСКА:
${topFlags.map(([f,c])=>`- ${FL[f]||f}: ${c} операций`).join("\n")}

ТОП ПАРЫ СЧЕТОВ:
${topPairs.map(([p,c])=>`- ${p}: ${c} раз`).join("\n")}`;

  if (topRiskyCPs.length > 0) {
    ctx += `\n\nКОНТРАГЕНТЫ С ВЫСОКИМ РИСКОМ:\n${topRiskyCPs.map(x=>`- ${x.cp}: средний балл ${x.avg.toFixed(0)}, ${x.count} операций`).join("\n")}`;
  }

  if (highRiskSamples.length > 0) {
    ctx += `\n\nПРИМЕРЫ HIGH RISK ОПЕРАЦИЙ:\n${highRiskSamples.join("\n")}`;
  }

  if (APP.compareResult) {
    const c = APP.compareResult;
    ctx += `\n\nСРАВНЕНИЕ С ПРЕДЫДУЩИМ ПЕРИОДОМ (${APP.prevName}):
- Операций: ${c.prevLen} → ${c.curLen}
- HIGH Risk: ${c.prevCounts.HIGH} → ${c.curCounts.HIGH}
- Новых контрагентов: ${c.newCPs.length}
- Новых пар счетов: ${c.newPairs.length}`;
  }

  return ctx;
}

      ${CHIPS.map(c=>`<button class="ai-chip" onclick="sendAIMessage(${JSON.stringify(c)})">${esc(c)}</button>`).join("")}
    </div>
    <div class="ai-input-row">
      <textarea class="ai-input" id="aiInput" placeholder="${hasKey ? 'Задайте вопрос по данным аудита...' : 'Сначала введите API-ключ выше...'}"
        ${hasKey ? '' : 'disabled'}
        rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendFromInput()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="ai-send-btn" id="aiSendBtn" onclick="sendFromInput()" ${hasKey ? '' : 'disabled'}>Отправить</button>
    </div>
  </div>`;
}

function formatAIText(text) {
  return esc(text)
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<div style="font-size:13px;font-weight:700;color:#5bc0fa;margin:8px 0 4px">$1</div>')
    .replace(/^## (.+)$/gm, '<div style="font-size:14px;font-weight:700;color:#e8ecf2;margin:10px 0 4px">$1</div>')
    .replace(/^- (.+)$/gm, '<div style="padding-left:12px;margin:2px 0">• $1</div>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function setupAIChat() {
  const msgs = document.getElementById("aiMessages");
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function saveApiKey() {
  const input = document.getElementById("apiKeyInput");
  if (!input) return;
  const key = input.value.trim();
  if (!key.startsWith("gsk_")) {
    input.style.borderColor = "#ff3b5c";
    input.placeholder = "Неверный формат — должен начинаться с gsk_...";
    setTimeout(() => { input.style.borderColor = ""; }, 2000);
    return;
  }
  APP.apiKey = key;
  // Сохраняем в localStorage если стоит галочка
  const remember = document.getElementById("rememberKey");
  if (remember && remember.checked) {
    try { localStorage.setItem("optro_groq_key", key); } catch(e) {}
  }
  render();
}

function clearApiKey() {
  APP.apiKey = "";
  try { localStorage.removeItem("optro_groq_key"); } catch(e) {}
  render();
}

function sendFromInput() {
  const input = document.getElementById("aiInput");
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  input.style.height = "auto";
  sendAIMessage(text);
}

async function sendAIMessage(userText) {
  if (APP.aiLoading || !userText.trim()) return;
  if (!APP.apiKey) {
    alert("Сначала введите API-ключ в поле выше.");
    return;
  }

  APP.aiMessages.push({role:"user", content: userText});
  APP.aiLoading = true;
  render();

  const auditContext = buildAuditContext();

  const systemPrompt = `Ты — опытный аудитор-аналитик и ИИ-ассистент системы OPTRO Risk Engine.
Твоя задача — помогать аудиторам анализировать журнал операций 1С и выявлять риски.

${auditContext}

Отвечай по-русски, конкретно и профессионально. Используй данные выше для точных ответов.
Если указываешь числа — бери их из контекста. Будь лаконичен но информативен.
Используй **жирный** для ключевых терминов. Можешь использовать списки с -.`;

  const messages = APP.aiMessages.map(m => ({role: m.role, content: m.content}));

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${APP.apiKey}`
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        max_tokens: 1000,
        messages: [
          {role: "system", content: systemPrompt},
          ...messages
        ]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(()=>({}));
      const msg = err?.error?.message || `HTTP ${response.status}`;
      throw new Error(msg);
    }

    const data = await response.json();
    const reply = data.choices && data.choices[0] && data.choices[0].message
      ? data.choices[0].message.content
      : "Извините, не удалось получить ответ. Попробуйте ещё раз.";

    APP.aiMessages.push({role:"assistant", content: reply});
  } catch(err) {
    APP.aiMessages.push({role:"assistant", content: `⚠️ Ошибка: ${err.message}`});
  }

  APP.aiLoading = false;
  render();
}

// EXCEL EXPORT
// ═══════════════════════════════════════════════════════════
function exportToExcel() {
  if (!APP.currentData) return;
  const wb = XLSX.utils.book_new();

  // ── ЛИСТ 1: Полный журнал ──
  const journalHeaders = ["Дата","Документ","Аналитика Дт","Аналитика Кт","Счет Дт","Группа Дт","Счет Кт","Группа Кт","Дебет","Кредит","Сумма","Риск-скор","Уровень риска","Флаги риска"];
  const journalRows = APP.currentData.map(r => [
    r.period, r.document, r.analytics_dt, r.analytics_kt,
    r.account_dt, r.group_dt, r.account_kt, r.group_kt,
    r.debit, r.credit, r.amount,
    r.risk_score, r.risk_level,
    r.risk_flags ? r.risk_flags.split(" | ").map(f => FL[f]||f).join("; ") : ""
  ]);
  const wsJournal = XLSX.utils.aoa_to_sheet([journalHeaders, ...journalRows]);

  // Ширина колонок
  wsJournal["!cols"] = [
    {wch:12},{wch:28},{wch:22},{wch:22},{wch:10},{wch:18},{wch:10},{wch:18},
    {wch:14},{wch:14},{wch:14},{wch:10},{wch:12},{wch:50}
  ];

  // Цвет заголовков (светло-синий)
  const headerStyle = {font:{bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1E3A5F"}},alignment:{horizontal:"center"}};
  journalHeaders.forEach((_,i) => {
    const cellRef = XLSX.utils.encode_cell({r:0, c:i});
    if (!wsJournal[cellRef]) wsJournal[cellRef] = {};
    wsJournal[cellRef].s = headerStyle;
  });

  // Цвет строк по уровню риска
  const riskFill = {HIGH:"4D1A1A", MEDIUM:"3D2800", LOW:"0D2033", NORMAL:"0D1A0D"};
  const riskFont = {HIGH:"FF3B5C", MEDIUM:"FF9F1A", LOW:"5BC0FA", NORMAL:"3DDC84"};
  APP.currentData.forEach((r, rowIdx) => {
    for (let c = 0; c < journalHeaders.length; c++) {
      const cellRef = XLSX.utils.encode_cell({r: rowIdx+1, c});
      if (!wsJournal[cellRef]) wsJournal[cellRef] = {v:"", t:"s"};
      wsJournal[cellRef].s = {
        fill: {fgColor:{rgb: riskFill[r.risk_level]||"0D1420"}},
        font: c === 12 ? {bold:true, color:{rgb: riskFont[r.risk_level]||"C4CEDB"}} : {color:{rgb:"C4CEDB"}},
        border: {bottom:{style:"thin",color:{rgb:"1E2536"}}}
      };
    }
  });

  XLSX.utils.book_append_sheet(wb, wsJournal, "Журнал операций");

  // ── ЛИСТ 2: Статистика ──
  const data = APP.currentData;
  const counts = {HIGH:0,MEDIUM:0,LOW:0,NORMAL:0};
  let totalAmt=0, suspAmt=0;
  data.forEach(r => { counts[r.risk_level]++; totalAmt+=r.amount; if(r.risk_score>=40) suspAmt+=r.amount; });

  const flagCounts = {};
  data.forEach(r => { if(r.risk_flags) r.risk_flags.split(" | ").forEach(f=>{if(f) flagCounts[f]=(flagCounts[f]||0)+1}); });
  const topFlags = Object.entries(flagCounts).sort((a,b)=>b[1]-a[1]);

  const pairFreq = {};
  data.forEach(r => { pairFreq[r.pair]=(pairFreq[r.pair]||0)+1; });
  const topPairs = Object.entries(pairFreq).sort((a,b)=>b[1]-a[1]).slice(0,10);

  const statsData = [
    ["СВОДНАЯ СТАТИСТИКА — " + APP.currentName],
    ["Дата отчёта:", new Date().toLocaleDateString("ru-RU")],
    [],
    ["ОБЩИЕ ПОКАЗАТЕЛИ"],
    ["Всего операций:", data.length],
    ["Общая сумма (₸):", Math.round(totalAmt)],
    ["Сумма подозрительных операций (₸):", Math.round(suspAmt)],
    ["% подозрительных от общей суммы:", totalAmt>0 ? (suspAmt/totalAmt*100).toFixed(1)+"%" : "0%"],
    [],
    ["РАСПРЕДЕЛЕНИЕ ПО УРОВНЮ РИСКА"],
    ["Уровень","Кол-во операций","% от всего"],
    ["HIGH (≥70)", counts.HIGH, data.length>0?(counts.HIGH/data.length*100).toFixed(1)+"%":"0%"],
    ["MEDIUM (40-69)", counts.MEDIUM, data.length>0?(counts.MEDIUM/data.length*100).toFixed(1)+"%":"0%"],
    ["LOW (20-39)", counts.LOW, data.length>0?(counts.LOW/data.length*100).toFixed(1)+"%":"0%"],
    ["NORMAL (<20)", counts.NORMAL, data.length>0?(counts.NORMAL/data.length*100).toFixed(1)+"%":"0%"],
    [],
    ["ТОП ФЛАГИ РИСКА"],
    ["Флаг риска","Кол-во","% от операций"],
    ...topFlags.map(([f,c]) => [FL[f]||f, c, (c/data.length*100).toFixed(1)+"%"]),
    [],
    ["ТОП ПАРЫ СЧЕТОВ"],
    ["Пара счетов","Кол-во"],
    ...topPairs.map(([p,c]) => [p, c])
  ];
  const wsStats = XLSX.utils.aoa_to_sheet(statsData);
  wsStats["!cols"] = [{wch:40},{wch:20},{wch:16}];
  // Заголовки секций жирным
  [[0,0],[3,0],[9,0],[16,0],[17,0],[18+topFlags.length+1,0],[18+topFlags.length+2,0]].forEach(([r,c])=>{
    const ref = XLSX.utils.encode_cell({r,c});
    if (wsStats[ref]) wsStats[ref].s = {font:{bold:true,color:{rgb:"5BC0FA"}},fill:{fgColor:{rgb:"0D1220"}}};
  });
  XLSX.utils.book_append_sheet(wb, wsStats, "Статистика");

  // ── ЛИСТ 3: Сравнение периодов ──
  if (APP.compareResult) {
    const c = APP.compareResult;
    const compareData = [
      ["СРАВНЕНИЕ ПЕРИОДОВ"],
      ["Текущий файл:", APP.currentName, "Предыдущий файл:", APP.prevName],
      [],
      ["ПОКАЗАТЕЛЬ","ПРЕДЫДУЩИЙ ПЕРИОД","ТЕКУЩИЙ ПЕРИОД","ИЗМЕНЕНИЕ","ИЗМЕНЕНИЕ %"],
      ["Кол-во операций", c.prevLen, c.curLen, c.curLen-c.prevLen, c.prevLen>0?((c.curLen-c.prevLen)/c.prevLen*100).toFixed(1)+"%":"—"],
      ["Общая сумма (₸)", Math.round(c.prevTotal), Math.round(c.curTotal), Math.round(c.curTotal-c.prevTotal), c.prevTotal>0?((c.curTotal-c.prevTotal)/c.prevTotal*100).toFixed(1)+"%":"—"],
      ["HIGH Risk", c.prevCounts.HIGH, c.curCounts.HIGH, c.curCounts.HIGH-c.prevCounts.HIGH, ""],
      ["MEDIUM Risk", c.prevCounts.MEDIUM, c.curCounts.MEDIUM, c.curCounts.MEDIUM-c.prevCounts.MEDIUM, ""],
      ["Подозрит. сумма (₸)", Math.round(c.prevSusp), Math.round(c.curSusp), Math.round(c.curSusp-c.prevSusp), ""],
      [],
      ["ИЗМЕНЕНИЯ ПО ГРУППАМ СЧЕТОВ"],
      ["Группа","Пред. период (₸)","Тек. период (₸)","Изменение (₸)","Изменение %","Статус"],
      ...c.groupChanges.slice(0,20).map(g => [
        g.group,
        Math.round(g.prevAmt),
        Math.round(g.curAmt),
        Math.round(g.delta),
        g.pct.toFixed(1)+"%",
        g.isNew?"НОВАЯ":g.isRemoved?"УБРАНА":Math.abs(g.pct)>50?"⚠ РЕЗКОЕ":""
      ]),
      [],
      ["НОВЫЕ КОНТРАГЕНТЫ (" + c.newCPs.length + ")"],
      ...c.newCPs.slice(0,50).map(cp => [cp]),
      [],
      ["НОВЫЕ ПАРЫ СЧЕТОВ (" + c.newPairs.length + ")"],
      ...c.newPairs.slice(0,30).map(p => [p])
    ];
    const wsCompare = XLSX.utils.aoa_to_sheet(compareData);
    wsCompare["!cols"] = [{wch:30},{wch:20},{wch:20},{wch:20},{wch:14},{wch:12}];
    XLSX.utils.book_append_sheet(wb, wsCompare, "Сравнение периодов");
  }

  // ── Сохранение ──
  const dateStr = new Date().toISOString().slice(0,10);
  const fileName = `OPTRO_Report_${APP.currentName.replace(/\.[^.]+$/,"")}_${dateStr}.xlsx`;
  XLSX.writeFile(wb, fileName);
}

// FILE HANDLING
// ═══════════════════════════════════════════════════════════
function handleFile(input, type) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    if (type === "current") {
      APP.currentFile = e.target.result;
      APP.currentName = file.name;
      showFileInfo("currentFileInfo", file);
    } else {
      APP.prevFile = e.target.result;
      APP.prevName = file.name;
      showFileInfo("prevFileInfo", file);
    }
    updateAnalyzeBtn();
  };
  reader.readAsArrayBuffer(file);
}

function showFileInfo(elId, file) {
  const size = file.size > 1e6 ? (file.size/1e6).toFixed(1)+" МБ" : (file.size/1024).toFixed(0)+" КБ";
  document.getElementById(elId).innerHTML = `
    <div class="file-loaded">
      <span style="font-size:18px">📄</span>
      <span class="file-loaded-name">${esc(file.name)}</span>
      <span class="file-loaded-size">${size}</span>
      <button class="file-loaded-remove" onclick="removeFile('${elId==='currentFileInfo'?'current':'prev'}')" title="Удалить">✕</button>
    </div>`;
}

function removeFile(type) {
  if (type === "current") {
    APP.currentFile = null; APP.currentName = "";
    document.getElementById("currentFileInfo").innerHTML = "";
    document.getElementById("fileCurrent").value = "";
  } else {
    APP.prevFile = null; APP.prevName = "";
    document.getElementById("prevFileInfo").innerHTML = "";
    document.getElementById("filePrev").value = "";
  }
  updateAnalyzeBtn();
}

function updateAnalyzeBtn() {
  const btn = document.getElementById("btnAnalyze");
  if (btn) btn.disabled = !APP.currentFile;
}

function setupDragDrop() {
  ["dropCurrent","dropPrev"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("drag-over"); });
    el.addEventListener("dragleave", () => el.classList.remove("drag-over"));
    el.addEventListener("drop", e => {
      e.preventDefault(); el.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const type = id === "dropCurrent" ? "current" : "prev";
      const inputId = type === "current" ? "fileCurrent" : "filePrev";
      // simulate
      const dt = new DataTransfer();
      dt.items.add(file);
      document.getElementById(inputId).files = dt.files;
      handleFile(document.getElementById(inputId), type);
    });
  });
}

// RUN ANALYSIS
// ═══════════════════════════════════════════════════════════
function runAnalysis() {
  const prog = document.getElementById("progressArea");
  if (prog) prog.innerHTML = `<div class="progress-bar"><div class="progress-fill" id="pFill" style="width:10%"></div></div>
    <div style="text-align:center;font-size:13px;color:#7a8da6" id="pText">Загрузка файлов...</div>`;

  setTimeout(() => {
    try {
      setProgress(20, "Парсинг текущего периода...");

      // Parse previous period first (for history comparison)
      let prevData = null;
      if (APP.prevFile) {
        setProgress(30, "Парсинг прошлого периода...");
        prevData = parseExcel(APP.prevFile);
        prevData = applyMapping(prevData, APP.mapping);
        prevData = calculateRisk(prevData, null);
        APP.prevData = prevData;
      }

      setProgress(50, "Парсинг текущего периода...");
      let currentData = parseExcel(APP.currentFile);

      setProgress(60, "Применяем маппинг...");
      currentData = applyMapping(currentData, APP.mapping);

      setProgress(70, "Считаем риск-скор...");
      currentData = calculateRisk(currentData, prevData);
      APP.currentData = currentData;

      setProgress(85, "Строим сравнение...");
      if (prevData) {
        APP.compareResult = compareData(currentData, prevData);
      } else {
        APP.compareResult = null;
      }

      setProgress(100, "Готово!");

      setTimeout(() => {
        TS.page = 'overview';
        renderApp();
      }, 400);

    } catch(err) {
      if (prog) prog.innerHTML = `<div class="panel" style="border-color:#ff3b5c44">
        <div style="color:#ff3b5c;font-weight:600;margin-bottom:8px">❌ Ошибка</div>
        <div style="font-size:13px;color:#c4cedb">${esc(err.message)}</div>
        <div style="font-size:12px;color:#5a6577;margin-top:8px">Убедитесь, что файл — это Excel-выгрузка 1С с листом «general» и 8 колонками.</div>
      </div>`;
    }
  }, 100);
}

function setProgress(pct, text) {
  const fill = document.getElementById("pFill");
  const txt = document.getElementById("pText");
  if (fill) fill.style.width = pct + "%";
  if (txt) txt.textContent = text;
}

async function loadProfile(userId) {
  const {data} = await sb.from('profiles').select('*').eq('id', userId).single();
  STATE.profile = data;
}

async function login(email, password) {
  const {data, error} = await sb.auth.signInWithPassword({email, password});
  if (error) throw error;
  await loadProfile(data.user.id);
  if (STATE.profile?.status === 'pending') {
    await sb.auth.signOut();
    throw new Error('Ваш аккаунт ожидает одобрения администратора');
  }
  if (STATE.profile?.status === 'blocked') {
    await sb.auth.signOut();
    throw new Error('Ваш аккаунт заблокирован');
  }
  STATE.user = data.user;
}

async function register(form) {
  const {data, error} = await sb.auth.signUp({email: form.email, password: form.password});
  if (error) throw error;
  const {error: pe} = await sb.from('profiles').insert({
    id: data.user.id,
    full_name: form.full_name,
    email: form.email,
    position: form.position,
    department: form.department,
    phone: form.phone,
    role: 'auditor',
    status: 'pending'
  });
  if (pe) throw pe;
}

async function logout() {
  await sb.auth.signOut();
  STATE.user = null; STATE.profile = null; STATE.page = 'dashboard';
  render();
}

function renderLoginForm() {

function renderRegForm() {
  document.getElementById('authForm').innerHTML = `
    <div class="form-row">
      <div class="form-group"><div class="form-label">Фамилия Имя Отчество *</div>
        <input class="form-input" id="regName" placeholder="Иванов Иван Иванович"></div>
      <div class="form-group"><div class="form-label">Email *</div>

    </div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">Пароль *</div>
        <input class="form-input" id="regPass" type="password" placeholder="Минимум 6 символов"></div>
      <div class="form-group"><div class="form-label">Должность *</div>
        <input class="form-input" id="regPosition" placeholder="Аудитор / Бухгалтер..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">Отдел</div>
        <select class="form-select" id="regDept">
          <option value="">Выберите отдел</option>
          ${DEPTS.map(d=>`<option>${d}</option>`).join('')}
        </select></div>
      <div class="form-group"><div class="form-label">Телефон</div>
        <input class="form-input" id="regPhone" placeholder="+7 777 000 00 00"></div>
    </div>
    <button class="btn-primary-auth" onclick="doRegister()">Отправить заявку</button>
    <div id="authMsg"></div>`;
}

function switchAuthTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabReg').classList.toggle('active', tab==='reg');
  if (tab==='login') renderLoginForm(); else renderRegForm();
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const msg = document.getElementById('authMsg');
  if (!email||!pass) { msg.innerHTML='<div class="auth-msg error">Заполните все поля</div>'; return; }
  msg.innerHTML='<div class="auth-msg info">Входим...</div>';
  try {
    await login(email, pass);
    await loadData();
    render();
  } catch(e) {
    msg.innerHTML=`<div class="auth-msg error">${esc(e.message)}</div>`;
  }
}

async function doRegister() {
  const msg = document.getElementById('authMsg');
  const form = {
    full_name: document.getElementById('regName').value.trim(),
    email: document.getElementById('regEmail').value.trim(),
    password: document.getElementById('regPass').value,
    position: document.getElementById('regPosition').value.trim(),
    department: document.getElementById('regDept').value,
    phone: document.getElementById('regPhone').value.trim()
  };
  if (!form.full_name||!form.email||!form.password||!form.position) {
    msg.innerHTML='<div class="auth-msg error">Заполните обязательные поля (*)</div>'; return;
  }
  if (form.password.length < 6) {
    msg.innerHTML='<div class="auth-msg error">Пароль минимум 6 символов</div>'; return;
  }
  msg.innerHTML='<div class="auth-msg info">Отправляем заявку...</div>';
  try {
    await register(form);
    msg.innerHTML='<div class="auth-msg success">✓ Заявка отправлена! Ожидайте одобрения администратора.</div>';
  } catch(e) {
    msg.innerHTML=`<div class="auth-msg error">${esc(e.message)}</div>`;
  }
}

    <div class="stat-card"><div class="accent" style="background:var(--blue)"></div>

      <div class="stat-value" style="color:var(--blue)">${inprog}</div>
      <div class="stat-sub">${review} на проверке</div></div>
    <div class="stat-card"><div class="accent" style="background:var(--red)"></div>
      <div class="stat-label">Просрочено</div>
      <div class="stat-value" style="color:var(--red)">${overdue}</div>
      <div class="stat-sub">Требует внимания</div></div>
    ${can_manage() ? `
    <div class="stat-card"><div class="accent" style="background:var(--green)"></div>
      <div class="stat-label">Команда</div>

      <div class="panel-header"><div><div class="panel-title">👥 Команда</div></div></div>
      <div class="table-wrap"><table><thead><tr><th>Сотрудник</th><th>Роль</th><th>Задач</th></tr></thead><tbody>
      ${STATE.profiles.filter(p=>p.status==='active').map(p=>{
        const cnt = STATE.tasks.filter(t=>t.assigned_to===p.id && t.status!=='completed').length;
        return `<tr><td><div style="display:flex;align-items:center;gap:8px">
          <div class="sb-avatar" style="width:24px;height:24px;font-size:9px">${initials(p.full_name)}</div>

function taskCardHTML(t) {
  const assignee = STATE.profiles.find(p=>p.id===t.assigned_to);
  const deadline_str = t.deadline ? `<span class="task-deadline ${is_overdue(t.deadline)&&t.status!=='completed'?'overdue':''}">📅 ${fmt_date(t.deadline)}</span>` : '';
  return `<div class="task-card priority-${t.priority}" onclick="openTask('${t.id}')">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
      <div class="task-title">${esc(t.title)}</div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <span class="badge badge-${t.priority}">${PRIORITIES[t.priority]}</span>
        <span class="badge badge-${t.status}">${STATUSES[t.status]}</span>
      </div>
    </div>
    ${t.file_name?`<div style="font-size:11px;color:var(--text3);margin:4px 0">📎 ${esc(t.file_name)}</div>`:''}
    <div class="task-meta">
      ${assignee?`<span>👤 ${esc(assignee.full_name.split(' ').slice(0,2).join(' '))}</span>`:''}
      ${deadline_str}
      ${t.description?`<span style="overflow:hidden;text-overflow:ellipsis;max-width:200px">${esc(t.description.slice(0,60))}${t.description.length>60?'...':''}</span>`:''}
    </div>
  </div>`;
}

function renderTasks(tasks) {
  const byStatus = {pending:[], in_progress:[], review:[], completed:[]};
  tasks.forEach(t => { if (byStatus[t.status]) byStatus[t.status].push(t); });

  const cols = [
    {key:'pending', label:'Ожидает', color:'var(--text3)'},
    {key:'in_progress', label:'В работе', color:'var(--blue)'},
    {key:'review', label:'На проверке', color:'var(--purple)'},
    {key:'completed', label:'Завершено', color:'var(--green)'}
  ];

  return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start">
    ${cols.map(col=>`
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 4px">
          <div style="width:8px;height:8px;border-radius:2px;background:${col.color}"></div>
          <span style="font-size:12px;font-weight:600;color:${col.color}">${col.label}</span>
          <span style="font-size:11px;color:var(--text3);margin-left:auto">${byStatus[col.key].length}</span>
        </div>
        <div class="task-list">
          ${byStatus[col.key].length===0
            ? `<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px;border:1px dashed var(--border);border-radius:8px">Нет задач</div>`
            : byStatus[col.key].map(t=>taskCardHTML(t)).join('')}
        </div>
      </div>`).join('')}
  </div>`;
}
